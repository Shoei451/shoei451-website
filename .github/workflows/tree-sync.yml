name: Update Remote Tree MD

on:
  push:
    branches: [main]

jobs:
  sync-tree:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Repo
        uses: actions/checkout@v4

      - name: Read Config and Generate Pattern
        id: config
        run: |
          CONFIG_PATH=".github/config/tree-sync-config.json"

          # jqで値を抽出（target_branchの参照先ミスを修正）
          ENABLED=$(jq -r '.enabled' $CONFIG_PATH)
          TARGET_REPO=$(jq -r '.target_repo' $CONFIG_PATH)
          TARGET_BRANCH=$(jq -r '.target_branch' $CONFIG_PATH)
          OUTPUT_PATH=$(jq -r '.output_path' $CONFIG_PATH)
          EXCLUDE_PATTERN=$(jq -r '.exclude | join("|")' $CONFIG_PATH)

          echo "enabled=$ENABLED" >> $GITHUB_OUTPUT
          echo "target_repo=$TARGET_REPO" >> $GITHUB_OUTPUT
          echo "target_branch=$TARGET_BRANCH" >> $GITHUB_OUTPUT
          echo "output_path=$OUTPUT_PATH" >> $GITHUB_OUTPUT
          echo "exclude_pattern=$EXCLUDE_PATTERN" >> $GITHUB_OUTPUT

      - name: Generate Tree Markdown
        if: steps.config.outputs.enabled == 'true'
        run: |
          sudo apt-get install -y tree

          echo "# Repository Tree" > /tmp/working_tree.md
          # 【重要】日時の出力を削除（これがあると毎回差分が出てしまいます）
          echo "" >> /tmp/working_tree.md
          echo '```' >> /tmp/working_tree.md

          # ツリー生成
          tree -I "${{ steps.config.outputs.exclude_pattern }}" --prune >> /tmp/working_tree.md

          echo '```' >> /tmp/working_tree.md
          mv /tmp/working_tree.md tree.md

      - name: Checkout Target Repo (Repo2)
        if: steps.config.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.config.outputs.target_repo }}
          token: ${{ secrets.REPO_SYNC_PAT }}
          path: target-repo
          ref: ${{ steps.config.outputs.target_branch }}

      - name: Commit and Push to Repo2
        if: steps.config.outputs.enabled == 'true'
        run: |
          TARGET_FILE="target-repo/${{ steps.config.outputs.output_path }}"
          mkdir -p "$(dirname "$TARGET_FILE")"
          cp tree.md "$TARGET_FILE"

          cd target-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 特定のファイルのみをステージング
          git add "${{ steps.config.outputs.output_path }}"

          # ステージングされた内容に差分があるか確認
          if ! git diff --cached --quiet; then
            echo "Tree structure changed. Committing..."
            git commit -m "docs: update file tree from ${{ github.repository }}"
            git push origin ${{ steps.config.outputs.target_branch }}
          else
            echo "No changes in tree structure. Skipping push."
          fi

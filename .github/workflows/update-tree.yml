name: Update File Trees

on:
  push:
    branches:
      - main
    paths-ignore:
      - FILETREE.md
      - docs/file-tree.js

permissions:
  contents: write

jobs:
  update-filetrees:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      # docs/file-tree.js を生成
      - name: Generate docs/file-tree.js
        run: node ./docs/build.js

      # FILETREE.md を生成
      - name: Generate FILETREE.md
        run: |
          echo "# File Tree" > FILETREE.md
          echo "" >> FILETREE.md
          echo "- Generated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> FILETREE.md
          echo "- Commit: $GITHUB_SHA" >> FILETREE.md
          echo "" >> FILETREE.md
          echo '```' >> FILETREE.md

          npx tree-node-cli \
            -L 3 \
            -I "node_modules,.git,dist,.next" \
            >> FILETREE.md

          echo '```' >> FILETREE.md

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add FILETREE.md docs/file-tree.js

          git diff --cached --quiet || \
          git commit -m "Auto-update file trees [skip ci]"

          git push
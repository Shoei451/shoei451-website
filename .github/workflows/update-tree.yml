name: Update File Tree

on:
  push:
    branches:
      - main
    paths-ignore:
      - "FILETREE.md"

permissions:
  contents: write

jobs:
  update-filetree:
    runs-on: ubuntu-latest

    steps:
      - name: Build docs file tree
        run: node ./docs/build.js

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Generate FILETREE.md
        run: |
          echo "# File Tree" > FILETREE.md
          echo "" >> FILETREE.md
          echo "- Generated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> FILETREE.md
          echo "- Commit: $GITHUB_SHA" >> FILETREE.md
          echo "" >> FILETREE.md
          echo '```' >> FILETREE.md

          npx tree-node-cli \
            -L 3 \
            -I "node_modules,.git,dist,.next" \
            >> FILETREE.md

          echo '```' >> FILETREE.md

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add FILETREE.md
          git diff --cached --quiet || git commit -m "Update file tree"
          git push
<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="../../images/hex-quiz.svg" />
    <title>16進法クイズ — Shoei451</title>

    <!-- quiz-components base -->
    <link rel="stylesheet" href="../../quiz-components/quiz-shell.css" />
    <link
      rel="stylesheet"
      href="../../quiz-components/start/start-screen.css"
    />
    <link rel="stylesheet" href="../../quiz-components/progress/progress.css" />
    <link
      rel="stylesheet"
      href="../../quiz-components/question/question-area.css"
    />
    <link rel="stylesheet" href="../../quiz-components/answer/answer.css" />
    <link rel="stylesheet" href="../../quiz-components/feedback/feedback.css" />
    <link rel="stylesheet" href="../../quiz-components/result/result.css" />

    <!-- theme toggle -->
    <link rel="stylesheet" href="../../css/theme-toggle.css" />

    <!-- hex-quiz固有スタイル -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Theme Toggle -->
    <span class="logo-switches" id="theme-toggle-container"></span>

    <!-- Header -->
    <header class="qz-header">
      <div class="qz-header__inner">
        <span class="qz-header__title">16進法クイズ</span>
        <div class="qz-header__subtitle">16進法の基礎知識を練習しよう</div>
        <a
          href="../../sub-index.html?slug=informatics"
          class="qz-btn qz-btn--ghost qz-btn--sm"
        >
          Back to Informatics
        </a>
      </div>
    </header>

    <!-- Main -->
    <main class="qz-container">
      <!-- Start Screen -->
      <div id="start-screen" class="qz-screen hidden"></div>

      <!-- Quiz Screen -->
      <div id="quiz-screen" class="qz-screen hidden">
        <div id="qz-progress-bar"></div>
        <div id="qz-question-area"></div>

        <!-- カラーコードプレビュー（カラーコード問題のみ表示） -->
        <div id="hex-color-preview" class="hex-color-preview hidden"></div>

        <div id="qz-choices"></div>
        <div id="qz-text-input"></div>
        <div id="qz-feedback" class="hidden"></div>
        <div id="qz-nav-buttons"></div>

        <!-- ASCII表ボタン（ASCII問題のみ表示） -->
        <div id="hex-ascii-btn-wrap" class="hex-ascii-btn-wrap hidden">
          <button
            class="qz-btn qz-btn--ghost qz-btn--sm"
            id="hex-ascii-btn"
            type="button"
          >
            ASCII表を見る
          </button>
        </div>
      </div>

      <!-- Result Screen -->
      <div id="result-screen" class="qz-screen hidden"></div>
    </main>

    <!-- ASCII Table Modal -->
    <div
      id="hex-ascii-modal"
      class="hex-modal hidden"
      role="dialog"
      aria-modal="true"
      aria-label="ASCII文字コード表"
    >
      <div class="hex-modal__content">
        <div class="hex-modal__header">
          <span class="hex-modal__title">ASCII 文字コード表</span>
          <button
            class="qz-btn qz-btn--ghost qz-btn--sm"
            id="hex-ascii-close"
            type="button"
            aria-label="閉じる"
          >
            ✕
          </button>
        </div>
        <div class="hex-modal__body">
          <div id="hex-ascii-table-container"></div>
        </div>
      </div>
    </div>

    <!-- quiz-components JS -->
    <script src="../../quiz-components/start/start-screen.js"></script>
    <script src="../../quiz-components/progress/progress.js"></script>
    <script src="../../quiz-components/question/question-area.js"></script>
    <script src="../../quiz-components/answer/choice-buttons.js"></script>
    <script src="../../quiz-components/feedback/feedback.js"></script>
    <script src="../../quiz-components/result/result.js"></script>

    <!-- Theme Toggle -->
    <script src="../../js/theme-toggle.js"></script>

    <!-- Hex Quiz Logic -->
    <script src="logic.js"></script>
  </body>
</html>

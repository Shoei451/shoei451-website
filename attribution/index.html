<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attributions - Shoei451</title>
  <link rel="icon" type="image/x-icon" href="../images/favicon.ico" />
  <link rel="stylesheet" href="../css/common.css" />
  <link rel="stylesheet" href="../css/markdown-viewer.css" />
</head>
<body>
  <span class="logo-switches" id="theme-toggle-container"></span>

  <header>
    <h1>Attributions</h1>
    <p>This page renders Markdown from <code>attribution/attributions.md</code>.</p>
  </header>

  <main class="intro">
    <a href="../index.html" class="back-link">Back to Home</a>
  </main>

  <section class="markdown-wrapper">
    <div class="markdown-content" id="markdown-content">
      <div class="loading">Loading...</div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="../js/theme-toggle.js"></script>
  <script>
    marked.setOptions({
      breaks: true,
      gfm: true
    });

    async function loadMarkdown(filepath) {
      const content = document.getElementById('markdown-content');
      try {
        const response = await fetch(filepath);
        if (!response.ok) throw new Error('File not found');
        const markdown = await response.text();
        content.innerHTML = marked.parse(markdown);
      } catch (error) {
        content.innerHTML = `
          <div style="text-align: center; padding: 40px; color: var(--secondary);">
            <h2>Markdown file could not be loaded.</h2>
            <p>Please check attribution/attributions.md.</p>
            <p style="font-size: 0.9rem; opacity: 0.7;">Error: ${error.message}</p>
          </div>
        `;
      }
    }

    loadMarkdown('./attributions.md');
  </script>

</body>
</html>

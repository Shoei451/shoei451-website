<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attributions - Shoei451</title>
  <link rel="icon" type="image/x-icon" href="../images/favicon.ico" />
  <link rel="stylesheet" href="../css/common.css" />
  <link rel="stylesheet" href="../css/specific-styles/markdown-viewer.css" />
</head>
<body>
  <span class="logo-switches">
    <button id="theme-toggle" title="Toggle Theme">
      <svg id="moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
      <svg id="sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </svg>
    </button>
  </span>

  <header>
    <h1>Attributions</h1>
    <p>This page renders Markdown from <code>attribution/attributions.md</code>.</p>
  </header>

  <main class="intro">
    <a href="../index.html" class="back-link">Back to Home</a>
  </main>

  <section class="markdown-wrapper">
    <div class="markdown-content" id="markdown-content">
      <div class="loading">Loading...</div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="../js/theme-toggle.js"></script>
  <script>
    marked.setOptions({
      breaks: true,
      gfm: true
    });

    async function loadMarkdown(filepath) {
      const content = document.getElementById('markdown-content');
      try {
        const response = await fetch(filepath);
        if (!response.ok) throw new Error('File not found');
        const markdown = await response.text();
        content.innerHTML = marked.parse(markdown);
      } catch (error) {
        content.innerHTML = `
          <div style="text-align: center; padding: 40px; color: var(--secondary);">
            <h2>Markdown file could not be loaded.</h2>
            <p>Please check attribution/attributions.md.</p>
            <p style="font-size: 0.9rem; opacity: 0.7;">Error: ${error.message}</p>
          </div>
        `;
      }
    }

    loadMarkdown('./attributions.md');
  </script>
</body>
</html>

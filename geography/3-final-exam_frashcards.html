<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>地理フラッシュカード｜期末テスト対策 — Shoei451</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg: #fafaf8;
      --color-surface: #ffffff;
      --color-border: #e8e8e5;
      --color-text-primary: #1a1a1a;
      --color-text-secondary: #6b6b6b;
      --color-accent: #2d6a4f;
      --color-accent-light: #e8f5e9;

      --cat-canada: #3b82f6;
      --cat-canada-bg: #3b82f6;
      --cat-canada-light: #eff6ff;
      --cat-religion: #8b5cf6;
      --cat-religion-bg: #8b5cf6;
      --cat-religion-light: #f5f3ff;
      --cat-islam: #d97706;
      --cat-islam-bg: #d97706;
      --cat-islam-light: #fffbeb;
      --cat-palestine: #dc2626;
      --cat-palestine-bg: #dc2626;
      --cat-palestine-light: #fef2f2;
      --cat-geography: #0891b2;
      --cat-geography-bg: #0891b2;
      --cat-geography-light: #ecfeff;
      --cat-disaster: #65a30d;
      --cat-disaster-bg: #65a30d;
      --cat-disaster-light: #f7fee7;

      --font-sans: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif;
      --font-display: 'Zen Kaku Gothic New', 'Noto Sans JP', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;

      --radius-sm: 6px;
      --radius-md: 12px;
      --radius-lg: 20px;
      --shadow-md: 0 4px 16px rgba(0,0,0,0.10);
    }

    body {
      font-family: var(--font-sans);
      font-feature-settings: "pkna";
      -webkit-font-smoothing: antialiased;
      background: var(--color-bg);
      color: var(--color-text-primary);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: rgba(255,255,255,0.9);
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--color-border);
      padding: 0.75rem 1.5rem;
      position: sticky; top: 0; z-index: 100;
    }
    .header-inner {
      max-width: 760px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap;
    }
    .header-title {
      font-family: var(--font-display); font-size: 0.95rem; font-weight: 700;
    }
    .header-title small {
      font-family: var(--font-mono); font-size: 0.7rem;
      color: var(--color-text-secondary); font-weight: 400; margin-left: 0.5rem;
    }
    .progress-wrap {
      display: flex; align-items: center; gap: 0.75rem;
      font-family: var(--font-mono); font-size: 0.78rem; color: var(--color-text-secondary);
    }
    .progress-bar {
      width: 100px; height: 4px;
      background: var(--color-border); border-radius: 100px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: var(--color-accent);
      border-radius: 100px; transition: width 0.35s ease; width: 0%;
    }
    #score-text { color: var(--color-accent); font-weight: 600; }

    /* ── Filter ── */
    .filter-wrap {
      max-width: 760px; margin: 1.25rem auto 0.5rem;
      padding: 0 1.5rem;
      display: flex; gap: 0.4rem; flex-wrap: wrap;
    }
    .filter-btn {
      padding: 0.28rem 0.85rem; border-radius: 100px;
      border: 1px solid var(--color-border); background: var(--color-surface);
      font-family: var(--font-sans); font-size: 0.76rem;
      cursor: pointer; color: var(--color-text-secondary);
      transition: all 0.15s; white-space: nowrap;
    }
    .filter-btn:hover { border-color: #999; color: var(--color-text-primary); }
    .filter-btn.active { background: var(--color-accent); border-color: var(--color-accent); color: #fff; }

    /* ── Main ── */
    main { max-width: 760px; margin: 0 auto; padding: 0 1.5rem 4rem; }

    .card-area { display: flex; flex-direction: column; align-items: center; gap: 1.25rem; }

    .card-counter {
      font-family: var(--font-mono); font-size: 0.78rem;
      color: var(--color-text-secondary); align-self: flex-end;
    }

    /* ── Flip card ── */
    .flashcard-wrap { width: 100%; perspective: 1400px; }

    .flashcard {
      width: 100%; min-height: 280px;
      position: relative; transform-style: preserve-3d;
      transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
      cursor: pointer;
    }
    .flashcard.flipped { transform: rotateY(180deg); }

    .card-face {
      position: absolute; width: 100%; min-height: 280px;
      -webkit-backface-visibility: hidden; backface-visibility: hidden;
      border-radius: var(--radius-lg);
      padding: 2.5rem 2rem;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center; text-align: center;
      box-shadow: var(--shadow-md);
    }
    .card-front {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
    }
    .card-back {
      transform: rotateY(180deg);
      color: white;
      /* background set dynamically */
    }

    .card-cat-badge {
      font-size: 0.7rem; font-family: var(--font-mono);
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 0.2rem 0.7rem; border-radius: 100px;
      margin-bottom: 1rem; font-weight: 500;
    }
    .card-front .card-cat-badge {
      /* color/bg set by JS */
    }
    .card-back .card-cat-badge {
      background: rgba(255,255,255,0.2); color: white;
    }

    .card-q {
      font-size: clamp(1rem, 2.8vw, 1.25rem);
      font-family: var(--font-display); font-weight: 700;
      line-height: 1.6; color: var(--color-text-primary);
      white-space: pre-line;
    }
    .flip-hint {
      margin-top: 1.25rem; font-size: 0.73rem;
      color: var(--color-text-secondary);
      display: flex; align-items: center; gap: 0.3rem;
    }
    .key {
      display: inline-block; background: var(--color-bg);
      border: 1px solid var(--color-border); border-radius: 4px;
      padding: 0.05rem 0.4rem; font-family: var(--font-mono); font-size: 0.68rem;
    }

    .card-a {
      font-size: clamp(1rem, 3vw, 1.4rem);
      font-family: var(--font-display); font-weight: 700;
      line-height: 1.65; color: white; white-space: pre-line;
    }
    .card-sub {
      margin-top: 0.9rem; font-size: 0.82rem;
      color: rgba(255,255,255,0.78); line-height: 1.65; white-space: pre-line;
    }

    /* ── Controls ── */
    .controls {
      display: flex; gap: 0.75rem; flex-wrap: wrap;
      justify-content: center; width: 100%;
    }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 0.4rem;
      padding: 0.65rem 1.4rem; border-radius: var(--radius-sm);
      font-family: var(--font-sans); font-size: 0.88rem; font-weight: 500;
      cursor: pointer; border: none; transition: all 0.15s;
    }
    .btn--ghost {
      background: transparent; border: 1px solid var(--color-border);
      color: var(--color-text-secondary);
    }
    .btn--ghost:hover { background: #f0f0ee; color: var(--color-text-primary); }
    .btn--ok { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; }
    .btn--ok:hover { background: #a7f3d0; }
    .btn--ng { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
    .btn--ng:hover { background: #fecaca; }
    .btn--primary { background: var(--color-accent); color: white; }
    .btn--primary:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }

    .keyboard-hint {
      font-size: 0.72rem; color: var(--color-text-secondary); text-align: center;
    }

    /* ── Result ── */
    .result-screen {
      display: none; flex-direction: column; align-items: center;
      gap: 1.25rem; padding: 4rem 1.5rem; text-align: center;
    }
    .result-screen.show { display: flex; }
    .result-emoji { font-size: 4rem; }
    .result-score {
      font-family: var(--font-mono); font-size: 3rem; font-weight: 700;
      color: var(--color-accent);
    }
    .result-label { font-size: 1rem; color: var(--color-text-secondary); }

    @media (max-width: 560px) {
      .card-face { padding: 1.75rem 1.25rem; min-height: 240px; }
      .flashcard { min-height: 240px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-title">
      地理 フラッシュカード
      <small>期末テスト対策</small>
    </div>
    <div class="progress-wrap">
      <span id="progress-text">0 / 0</span>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <span id="score-text">✓ 0</span>
    </div>
  </div>
</header>

<div class="filter-wrap">
  <button class="filter-btn active" data-filter="all">すべて</button>
  <button class="filter-btn" data-filter="canada">カナダ</button>
  <button class="filter-btn" data-filter="religion">宗教・食生活</button>
  <button class="filter-btn" data-filter="islam">イスラーム</button>
  <button class="filter-btn" data-filter="palestine">パレスチナ</button>
  <button class="filter-btn" data-filter="geography">自然環境</button>
  <button class="filter-btn" data-filter="disaster">防災</button>
</div>

<main>
  <div class="card-area" id="card-area">
    <div class="card-counter" id="card-counter">1 / 1</div>

    <div class="flashcard-wrap">
      <div class="flashcard" id="flashcard" onclick="flipCard()">
        <div class="card-face card-front" id="card-front">
          <span class="card-cat-badge" id="front-badge"></span>
          <p class="card-q" id="card-q"></p>
          <div class="flip-hint">クリックまたは <span class="key">Space</span> で答えを見る</div>
        </div>
        <div class="card-face card-back" id="card-back">
          <span class="card-cat-badge" id="back-badge"></span>
          <p class="card-a" id="card-a"></p>
          <p class="card-sub" id="card-sub"></p>
        </div>
      </div>
    </div>

    <div class="controls">
      <button class="btn btn--ghost" onclick="prevCard()">← 前へ</button>
      <button class="btn btn--ok" id="btn-ok" onclick="markOK()" disabled>✓ わかった</button>
      <button class="btn btn--ng" id="btn-ng" onclick="markNG()" disabled>✗ もう一度</button>
      <button class="btn btn--ghost" onclick="nextCard()">次へ →</button>
    </div>
    <div class="keyboard-hint">
      <span class="key">←→</span> ページ移動　<span class="key">Space</span> めくる　<span class="key">O</span> わかった　<span class="key">X</span> もう一度
    </div>
  </div>

  <div class="result-screen" id="result-screen">
    <div class="result-emoji" id="result-emoji">🎉</div>
    <div class="result-score" id="result-score"></div>
    <div class="result-label" id="result-label"></div>
    <button class="btn btn--primary" onclick="restart()">もう一度やる</button>
    <button class="btn btn--ghost" onclick="restartWrong()">✗ 間違えた問題だけ</button>
  </div>
</main>

<script>

// ── Category accent colors ──────────────────────────
const CAT_COLORS = {
  canada:    { text:'#3b82f6', bg:'#eff6ff', card:'#3b82f6' },
  religion:  { text:'#8b5cf6', bg:'#f5f3ff', card:'#7c3aed' },
  islam:     { text:'#d97706', bg:'#fffbeb', card:'#d97706' },
  palestine: { text:'#dc2626', bg:'#fef2f2', card:'#dc2626' },
  geography: { text:'#0891b2', bg:'#ecfeff', card:'#0891b2' },
  disaster:  { text:'#65a30d', bg:'#f7fee7', card:'#65a30d' },
};

// ── State ──────────────────────────────────────────────
let S = {
  filter: 'all',
  deck: [],
  current: 0,
  flipped: false,
  known: new Set(),
  unknown: new Set(),
  wrongDeck: [],
};

function getDeck(filter) {
  return filter === 'all' ? [...ALL_CARDS] : ALL_CARDS.filter(c => c.cat === filter);
}

function init(deck) {
  S.deck    = deck;
  S.current = 0;
  S.flipped = false;
  S.known   = new Set();
  S.unknown = new Set();
  document.getElementById('card-area').style.display = 'flex';
  document.getElementById('result-screen').classList.remove('show');
  renderCard();
  updateHeader();
}

function renderCard() {
  const card = S.deck[S.current];
  if (!card) return;
  const col = CAT_COLORS[card.cat];

  // front badge
  const fb = document.getElementById('front-badge');
  fb.textContent = card.label;
  fb.style.background = col.bg;
  fb.style.color = col.text;

  // back badge
  document.getElementById('back-badge').textContent = card.label;

  // back card color
  document.getElementById('card-back').style.background = col.card;

  document.getElementById('card-q').textContent = card.q;
  document.getElementById('card-a').textContent = card.a;
  document.getElementById('card-sub').textContent = card.sub || '';

  // reset flip
  S.flipped = false;
  document.getElementById('flashcard').classList.remove('flipped');
  document.getElementById('btn-ok').disabled = true;
  document.getElementById('btn-ng').disabled = true;

  document.getElementById('card-counter').textContent =
    `${S.current + 1} / ${S.deck.length}`;
}

function flipCard() {
  S.flipped = !S.flipped;
  document.getElementById('flashcard').classList.toggle('flipped', S.flipped);
  document.getElementById('btn-ok').disabled = !S.flipped;
  document.getElementById('btn-ng').disabled = !S.flipped;
}

function nextCard() {
  if (S.current < S.deck.length - 1) {
    S.current++;
    renderCard();
    updateHeader();
  } else if (S.known.size + S.unknown.size >= S.deck.length) {
    showResult();
  }
}

function prevCard() {
  if (S.current > 0) { S.current--; renderCard(); }
}

function markOK() {
  if (!S.flipped) return;
  S.known.add(S.current);
  S.unknown.delete(S.current);
  updateHeader(); nextCard();
}

function markNG() {
  if (!S.flipped) return;
  S.unknown.add(S.current);
  S.known.delete(S.current);
  updateHeader(); nextCard();
}

function updateHeader() {
  const total = S.deck.length;
  const done  = S.known.size + S.unknown.size;
  document.getElementById('progress-fill').style.width = (total ? done/total*100 : 0) + '%';
  document.getElementById('progress-text').textContent = `${done} / ${total}`;
  document.getElementById('score-text').textContent = `✓ ${S.known.size}`;
}

function showResult() {
  document.getElementById('card-area').style.display = 'none';
  document.getElementById('result-screen').classList.add('show');
  const correct = S.known.size, total = S.deck.length;
  const pct = Math.round(correct/total*100);
  document.getElementById('result-score').textContent = `${correct} / ${total}`;
  document.getElementById('result-emoji').textContent = pct>=80?'🎉':pct>=60?'😊':'📚';
  document.getElementById('result-label').textContent =
    pct>=80 ? 'よくできました！本番も大丈夫👍' :
    pct>=60 ? 'もう少し！間違えた問題を復習しよう' :
    '復習が必要。間違えた問題に絞って再挑戦！';
  S.wrongDeck = [...S.unknown].map(i => S.deck[i]);
}

function restart() { init(getDeck(S.filter)); }
function restartWrong() { init(S.wrongDeck.length ? S.wrongDeck : getDeck(S.filter)); }

// filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    S.filter = btn.dataset.filter;
    init(getDeck(S.filter));
  });
});

// keyboard
document.addEventListener('keydown', e => {
  if (e.key===' '||e.key==='Spacebar') { e.preventDefault(); flipCard(); }
  if (e.key==='ArrowRight') nextCard();
  if (e.key==='ArrowLeft')  prevCard();
  if ((e.key==='o'||e.key==='O') && S.flipped) markOK();
  if ((e.key==='x'||e.key==='X') && S.flipped) markNG();
});

// boot
init(getDeck('all'));
</script>

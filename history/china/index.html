<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="../../images/chinese-history.svg" />
    <title>中国王朝史 年代クイズ — Shoei451</title>

    <link rel="stylesheet" href="../../css/theme-toggle.css" />
    <link rel="stylesheet" href="../../quiz-components/quiz-shell.css" />
    <link
      rel="stylesheet"
      href="../../quiz-components/start/start-screen.css"
    />
    <link rel="stylesheet" href="../../quiz-components/progress/progress.css" />
    <link
      rel="stylesheet"
      href="../../quiz-components/question/question-area.css"

    <link rel="stylesheet" href="../../quiz-components/answer/answer.css" />
    <link rel="stylesheet" href="../../quiz-components/feedback/feedback.css" />

    <style>
      :root {
        --qz-accent: #dfbc5e;
        --qz-accent-dark: #d73c37;
        --qz-accent-light: rgba(223, 188, 94, 0.16);
        --qz-accent-ring: rgba(223, 188, 94, 0.28);
        --qz-bg: #fdf6e3;
        --qz-surface: #fff9ea;
        --qz-surface-2: #f4ebcf;
        --qz-text: #073642;
        --qz-text-sub: #586e75;
        --qz-border: #e6e0ae;
      }

      body.dark {
        --qz-accent: #dfbc5e;
        --qz-accent-dark: #ee6146;
        --qz-accent-light: rgba(223, 188, 94, 0.18);
        --qz-accent-ring: rgba(223, 188, 94, 0.32);
        --qz-bg: #002b36;
        --qz-surface: #073642;
        --qz-surface-2: #123f4b;
        --qz-text: #eee8d5;
        --qz-text-sub: #93a1a1;
        --qz-border: #586e75;
      }
    </style>
  </head>
  <body>
    <header class="qz-header">
      <div class="qz-header__inner">
        <div class="qz-header__title-wrap">
          <div class="qz-header__title">中国王朝史 年代クイズ</div>
          <div class="qz-header__subtitle">出来事 → 年号</div>
        </div>
        <div class="qz-header__actions">
          <a
            class="qz-btn qz-btn--ghost qz-btn--sm"
            href="../../sub-index.html?slug=history"
          >
            歴史ホームへ戻る
          </a>
          <span class="logo-switches" id="theme-toggle-container"></span>
        </div>
      </div>
    </header>

    <main class="qz-container">
      <div id="start-screen" class="qz-screen"></div>

      <div id="quiz-screen" class="qz-screen hidden">
        <div id="qz-progress-bar"></div>
        <div id="qz-question-area"></div>
        <div id="qz-text-input"></div>
        <div id="qz-feedback" class="hidden"></div>
        <div id="qz-nav-buttons"></div>
      </div>

      <div id="result-screen" class="qz-screen hidden"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../quiz-components/wh-utils.js"></script>
    <script src="../../quiz-components/start/start-screen.js"></script>
    <script src="../../quiz-components/progress/progress.js"></script>
    <script src="../../quiz-components/question/question-area.js"></script>
    <script src="../../quiz-components/answer/text-input.js"></script>
    <script src="../../quiz-components/feedback/feedback.js"></script>
    <script src="../../quiz-components/result/result.js"></script>
    <script type="module" src="quiz.js"></script>
    <script src="../../js/theme-toggle.js"></script>
  </body>

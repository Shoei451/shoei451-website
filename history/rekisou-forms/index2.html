<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>歴史総合 語句確認フォーム — Shoei451</title>
    <link rel="icon" href="/images/favicon.ico" />

    <!-- フラッシュ防止 -->
    <script>
      (function () {
        const t = localStorage.getItem("pref-theme");
        if (
          t === "dark" ||
          (!t && matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>

    <link rel="stylesheet" href="/css/base.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="rekisou-forms.css" />

    <style>
      html.dark body {
        background-color: var(--color-bg);
        color: var(--color-text-primary);
      }
    </style>
  </head>

  <body>
    <div id="nav-container"></div>

    <main class="container py-4">
      <div class="page-header">
        <a href="/sub-index.html?slug=history" class="back-link mb-2">
          <i class="bi bi-chevron-left"></i> 歴史ホーム
        </a>
        <h1 class="page-header__title">歴史総合 語句確認フォーム</h1>
        <p class="page-header__desc">
          歴史総合の語句確認用 Google Forms 一覧です。
        </p>
      </div>

      <div
        id="forms-container"
        class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-3"
      >
        <!-- forms-data.js + logic で inject される -->
      </div>
    </main>

    <footer id="site-footer"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/nav.js"></script>
    <script src="/js/theme-toggle.js"></script>

    <script>
      if (document.documentElement.classList.contains("dark")) {
        document.body.classList.add("dark");
      }
    </script>

    <script src="forms-data.js"></script>
  </body>
</html>

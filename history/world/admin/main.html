<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>世界史年表 データ管理 (wh_dates)</title>
    <link rel="icon" href="../../../images/worldhistoryquiz.png" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../../js/supabase_config.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ========== 管理画面 ========== -->
    <header>
        <div class="header-content">
            <div>
                <h1>世界史年表 管理画面</h1>
                <span class="admin-badge">wh_dates</span>
            </div>
            <span class="logo-switches">
                <span id="loggedInUser" class="user-info"></span>
                <button id="logoutBtn" class="btn-logout" type="button">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    ログアウト
                </button>
                <a href="memo.html" class="btn-logout" style="text-decoration:none;">📝 メモ編集</a>
                <a href="index.html" class="btn-logout" style="text-decoration:none;">← ホーム</a>
                <button id="theme-toggle" type="button" title="Toggle Theme">
                    <svg id="moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                    <svg id="sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                </button>
            </span>
        </div>
    </header>

    <div class="container">
        <!-- 統計 -->
        <div class="stats" id="statsSection">
            <div class="stat-item">
                <div class="stat-number" id="totalEvents">-</div>
                <div class="stat-label">総件数</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="displayedEvents">-</div>
                <div class="stat-label">表示中</div>
            </div>
        </div>

        <!-- コントロール -->
        <div class="controls">
            <input type="text" id="searchBox" class="search-box" placeholder="出来事を検索...">
            <select id="regionFilter" class="filter-select">
                <option value="all">地域: すべて</option>
            </select>
            <select id="fieldFilter" class="filter-select">
                <option value="all">分野: すべて</option>
                <option value="政治">政治</option>
                <option value="経済">経済</option>
                <option value="文化・宗教">文化・宗教</option>
                <option value="社会">社会</option>
                <option value="外交・戦争">外交・戦争</option>
            </select>
            <button class="btn-add" onclick="openAddModal()">+ 新規追加</button>
        </div>

        <!-- 種別タブ -->
        <div class="tabs" id="recordTypeTabs">
            <button class="tab active" data-record-type="all">すべて</button>
            <button class="tab" data-record-type="event">出来事</button>
            <button class="tab" data-record-type="period">期間</button>
            <button class="tab" data-record-type="person">人物</button>
        </div>

        <!-- テーブル -->
        <div id="timelineContainer">
            <div class="loading">読み込み中...</div>
        </div>
    </div>

    <!-- ========== 編集・追加モーダル ========== -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">新規追加</h2>
                <button class="close-modal" id="closeModal" type="button">×</button>
            </div>
            <form id="editForm">
                <input type="hidden" id="editEventId">

                <div class="form-group">
                    <label for="editRecordType">種別 *</label>
                    <select id="editRecordType">
                        <option value="event">出来事（点）</option>
                        <option value="period">期間</option>
                        <option value="person">人物</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="editYear">年（開始年・生年）</label>
                        <input type="number" id="editYear" placeholder="例: 1789 / -221">
                        <small>紀元前は負の数。不明なら空白。</small>
                    </div>
                    <div class="form-group" id="yearEndGroup" style="display:none;">
                        <label for="editYearEnd">終了年（没年）</label>
                        <input type="number" id="editYearEnd" placeholder="例: 1918 / -206">
                        <small>不明なら空白。</small>
                    </div>
                </div>

                <div class="form-group">
                    <label for="editDateType">日付の形式</label>
                    <select id="editDateType">
                        <option value="year">年のみ</option>
                        <option value="full">完全な日付</option>
                        <option value="circa">頃（circa）</option>
                    </select>
                </div>

                <div class="form-group" id="fullDateGroup" style="display:none;">
                    <label for="editFullDate">日付</label>
                    <input type="date" id="editFullDate">
                </div>

                <div class="form-group">
                    <label for="editEvent">出来事 *</label>
                    <div class="event-wiki-row">
                        <input type="text" id="editEvent" required placeholder="例: フランス革命 / ナポレオン">
                        <button type="button" id="wikiSearchBtn">🔍 Wiki検索</button>
                    </div>
                    <small>名詞形で短く。人物の場合は名前。</small>
                    <div id="wikiResultPanel" style="display:none;"></div>
                </div>

                <div class="form-group">
                    <label for="editDescription">説明</label>
                    <textarea id="editDescription" placeholder="補足説明（フラッシュカード裏面）"></textarea>
                </div>

                <div class="form-group">
                    <label>地域</label>
                    <div id="regionCheckboxes" class="region-checkbox-grid"></div>
                </div>

                <div class="form-group">
                    <label for="editField">分野</label>
                    <select id="editField">
                        <option value="">未設定</option>
                        <option value="政治">政治</option>
                        <option value="経済">経済</option>
                        <option value="文化・宗教">文化・宗教</option>
                        <option value="社会">社会</option>
                        <option value="外交・戦争">外交・戦争</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="editWikiUrl">Wikipedia URL</label>
                    <input type="url" id="editWikiUrl" placeholder="https://ja.wikipedia.org/wiki/...">
                </div>

                <div class="form-group">
                    <label for="editMemo">メモ（Markdown）</label>
                    <textarea id="editMemo" placeholder="補足資料・関連リンクなど"></textarea>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn-cancel" id="cancelBtn">キャンセル</button>
                    <button type="submit">保存</button>
                </div>
            </form>
        </div>
    </div>
    <script src="../../../js/wh-utils.js"></script>
    <script src="script.js"></script>
    <script>
        // ── セッションチェック（未認証なら index へ） ──────────────
        (async function() {
            const { data: { session } } = await db.auth.getSession();
            if (!session) {
                window.location.replace('index.html');
                return;
            }
            // 認証済み：既存の showAdminScreen と同等の初期化
            document.getElementById('loggedInUser').textContent = session.user.email;
            await loadRegions();
            setupEventListeners();
            await fetchTotalCount();
            await fetchPage(0);

            db.auth.onAuthStateChange((_e, s) => {
                if (!s) window.location.replace('index.html');
            });
        })();

        // ── ログアウト ──────────────────────────────────────────────
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await db.auth.signOut();
            window.location.replace('index.html');
        });
    </script>
  <script>
    navigator.sendBeacon(
      '/api/sw?path=' + encodeURIComponent(location.pathname) +
      '&ref=' + encodeURIComponent(document.referrer)
    );
  </script>
</body>
</html>

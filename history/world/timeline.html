<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>世界史年表 — Shoei451</title>
    <link rel="icon" href="../../images/worldhistoryquiz.png" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../quiz-components/wh-utils.js"></script>
    <!-- 変更後: theme-wh.css を先に読み込む -->
    <link rel="stylesheet" href="../../css/timeline.css" />
    <link rel="stylesheet" href="../../css/theme-toggle.css" />
    <style>
      /* ===================================================
   依存: ../../css/theme-wh.css
   =================================================== */

      /* ===== Event Date Cell ===== */
      .event-year {
        font-weight: 600;
        color: var(--accent-navy);
        white-space: nowrap;
        font-size: 1rem;
      }

      body.dark .event-year {
        color: var(--accent-gold);
      }

      /* ===== Wikipedia Link ===== */
      .event-link {
        color: var(--accent-gold);
        text-decoration: none;
        font-weight: 600;
      }

      .event-link:hover {
        text-decoration: underline;
      }

      /* ===== Stats Bar ===== */
      .stats {
        background: var(--bg-light-secondary);
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 20px;
        display: flex;
        gap: 30px;
        flex-wrap: wrap;
        justify-content: center;
        box-shadow: 0 2px 8px var(--shadow-light);
      }

      .stat-item {
        text-align: center;
      }

      .stat-number {
        font-size: 2rem;
        font-weight: 700;
        color: var(--accent-gold);
      }

      .stat-label {
        font-size: 0.9rem;
        color: var(--text-light-secondary);
      }

      /* ===== Period Chips ===== */
      /* 各チップのライト/ダーク配色をひとまとめに */
      .period-chip.\~0 {
        background: #e3f2fd;
        color: #1565c0;
      }
      body.dark .period-chip.\~0 {
        background: #1565c0;
        color: #e3f2fd;
      }

      .period-chip.\31\~1000 {
        background: #f3e5f5;
        color: #6a1b9a;
      }
      body.dark .period-chip.\31\~1000 {
        background: #6a1b9a;
        color: #f3e5f5;
      }

      .period-chip.\31001\~1500 {
        background: #fff3e0;
        color: #e65100;
      }
      body.dark .period-chip.\31001\~1500 {
        background: #e65100;
        color: #fff3e0;
      }

      .period-chip.\31501\~1700 {
        background: #e8f5e9;
        color: #2e7d32;
      }
      body.dark .period-chip.\31501\~1700 {
        background: #2e7d32;
        color: #e8f5e9;
      }

      .period-chip.\31701\~1800 {
        background: #fff9c4;
        color: #f57f17;
      }
      body.dark .period-chip.\31701\~1800 {
        background: #f57f17;
        color: #fff9c4;
      }

      .period-chip.\31801\~1900 {
        background: #e0f2f1;
        color: #00695c;
      }
      body.dark .period-chip.\31801\~1900 {
        background: #00695c;
        color: #e0f2f1;
      }

      .period-chip.\31901\~1945 {
        background: #fce4ec;
        color: #c2185b;
      }
      body.dark .period-chip.\31901\~1945 {
        background: #c2185b;
        color: #fce4ec;
      }

      .period-chip.\31946\~1989 {
        background: #f1f8e9;
        color: #558b2f;
      }
      body.dark .period-chip.\31946\~1989 {
        background: #558b2f;
        color: #f1f8e9;
      }

      .period-chip.\31990\~ {
        background: #bbdefb;
        color: #0d47a1;
      }
      body.dark .period-chip.\31990\~ {
        background: #0d47a1;
        color: #bbdefb;
      }

      /* ===== Chapter Chips ===== */
      .chapter-chip.第1章 {
        background: #e3f2fd;
        color: #1565c0;
      }
      body.dark .chapter-chip.第1章 {
        background: #1565c0;
        color: #e3f2fd;
      }

      .chapter-chip.第2章 {
        background: #f3e5f5;
        color: #6a1b9a;
      }
      body.dark .chapter-chip.第2章 {
        background: #6a1b9a;
        color: #f3e5f5;
      }

      .chapter-chip.第3章 {
        background: #bbdefb;
        color: #0d47a1;
      }
      body.dark .chapter-chip.第3章 {
        background: #0d47a1;
        color: #bbdefb;
      }

      .chapter-chip.第4章 {
        background: #e8f5e9;
        color: #2e7d32;
      }
      body.dark .chapter-chip.第4章 {
        background: #2e7d32;
        color: #e8f5e9;
      }

      .chapter-chip.第5章 {
        background: #f1f8e9;
        color: #558b2f;
      }
      body.dark .chapter-chip.第5章 {
        background: #558b2f;
        color: #f1f8e9;
      }

      .chapter-chip.第6章 {
        background: #e0f2f1;
        color: #00695c;
      }
      body.dark .chapter-chip.第6章 {
        background: #00695c;
        color: #e0f2f1;
      }

      .chapter-chip.第7章 {
        background: #fff9c4;
        color: #f57f17;
      }
      body.dark .chapter-chip.第7章 {
        background: #f57f17;
        color: #fff9c4;
      }

      .chapter-chip.第8章 {
        background: #fff3e0;
        color: #e65100;
      }
      body.dark .chapter-chip.第8章 {
        background: #e65100;
        color: #fff3e0;
      }

      .chapter-chip.第9章 {
        background: #fce4ec;
        color: #c2185b;
      }
      body.dark .chapter-chip.第9章 {
        background: #c2185b;
        color: #fce4ec;
      }

      .chapter-chip.第10章 {
        background: #ffebee;
        color: #c62828;
      }
      body.dark .chapter-chip.第10章 {
        background: #c62828;
        color: #ffebee;
      }

      .chapter-chip.第11章 {
        background: #e8eaf6;
        color: #3f51b5;
      }
      body.dark .chapter-chip.第11章 {
        background: #3f51b5;
        color: #e8eaf6;
      }

      /* ===== Responsive ===== */
      @media (max-width: 768px) {
        .header-content {
          flex-direction: column;
          align-items: flex-start;
        }
        h1 {
          font-size: 1.5rem;
        }
        .controls {
          width: 100%;
        }
        .search-box {
          width: 100%;
        }
        .timeline-table {
          font-size: 0.9rem;
        }
        .timeline-table th,
        .timeline-table td {
          padding: 10px;
        }
        .stats {
          gap: 15px;
        }
        .stat-number {
          font-size: 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-content">
        <h1>📜 世界史年表</h1>
        <div class="controls">
          <input
            type="text"
            id="searchBox"
            class="search-box"
            placeholder="イベントを検索..."
          />
          <span class="logo-switches" id="theme-toggle-container"></span>
        </div>
      </div>
    </header>

    <div class="container">
      <div class="stats" id="statsSection">
        <div class="stat-item">
          <div class="stat-number" id="totalEvents">-</div>
          <div class="stat-label">総イベント数</div>
        </div>
        <div class="stat-item">
          <div class="stat-number" id="displayedEvents">-</div>
          <div class="stat-label">表示中</div>
        </div>
      </div>

      <div style="margin-bottom: 20px; text-align: center">
        <label style="font-weight: 600; margin-right: 10px">表示モード:</label>
        <select
          id="viewMode"
          style="
            padding: 8px 12px;
            border: 2px solid var(--border-light);
            border-radius: 5px;
            background: var(--bg-light);
            color: var(--text-light);
            font-size: 0.95rem;
          "
        >
          <option value="period">時代別</option>
          <option value="chapter">章別</option>
        </select>
      </div>

      <div class="tabs" id="categoryTabs"></div>

      <div id="timelineContainer">
        <div class="loading">読み込み中...</div>
      </div>
    </div>

    <script src="../../js/theme-toggle.js"></script>
    <script type="module">
      import { db, tables } from "../../js/supabase_config.js";

      // State
      let allEvents = [];
      let currentCategory = "all";
      let currentViewMode = "period";
      let searchQuery = "";

      const periods = [
        { value: "~0", label: "紀元前" },
        { value: "1~1000", label: "1年~1000年" },
        { value: "1001~1500", label: "1001年~1500年" },
        { value: "1501~1700", label: "1501年~1700年" },
        { value: "1701~1800", label: "1701年~1800年" },
        { value: "1801~1900", label: "1801年~1900年" },
        { value: "1901~1945", label: "1901年~1945年" },
        { value: "1946~1989", label: "1946年~1989年" },
        { value: "1990~", label: "1990年~" },
      ];

      const chapters = [
        { value: "第1章", label: "古代文明圏" },
        { value: "第2章", label: "中世ヨーロッパ" },
        { value: "第3章", label: "近現代ヨーロッパ" },
        { value: "第4章", label: "東アジア（中国・モンゴル）" },
        { value: "第5章", label: "東アジア（日本・朝鮮）" },
        { value: "第6章", label: "イスラーム世界" },
        { value: "第7章", label: "南アジア・東南アジア" },
        { value: "第8章", label: "アメリカ大陸" },
        { value: "第9章", label: "第一次世界大戦" },
        { value: "第10章", label: "第二次世界大戦" },
        { value: "第11章", label: "戦後国際史" },
      ];

      document.addEventListener("DOMContentLoaded", function () {
        init();
      });

      async function init() {
        await loadEvents();
        setupEventListeners();
        renderTabs();
        renderTimeline();
      }

      async function loadEvents() {
        try {
          let allQuestions = [];
          let start = 0;
          const batchSize = 1000;

          while (true) {
            const { data, error } = await db
              .from(tables.WH_QUIZ)
              .select("*")
              .order("is_bc", { ascending: false })
              .order("year", { ascending: true })
              .range(start, start + batchSize - 1);

            if (error) throw error;
            if (!data || data.length === 0) break;

            allQuestions.push(...data);
            if (data.length < batchSize) break;
            start += batchSize;
          }

          allEvents = allQuestions;
          document.getElementById("totalEvents").textContent = allEvents.length;
        } catch (error) {
          console.error("Error loading events:", error);
          document.getElementById("timelineContainer").innerHTML = `
                    <div class="empty-state">
                        <p>⚠️ データの読み込みに失敗しました</p>
                    </div>
                `;
        }
      }

      function setupEventListeners() {
        document.getElementById("searchBox").addEventListener("input", (e) => {
          searchQuery = e.target.value;
          renderTimeline();
        });

        document.getElementById("viewMode").addEventListener("change", (e) => {
          currentViewMode = e.target.value;
          currentCategory = "all";
          renderTabs();
          renderTimeline();
        });
      }

      function renderTabs() {
        const container = document.getElementById("categoryTabs");
        const categories = currentViewMode === "period" ? periods : chapters;

        container.innerHTML = `
                <button class="tab active" data-category="all">すべて</button>
                ${categories
                  .map(
                    (cat) =>
                      `<button class="tab" data-category="${cat.value}">${cat.label}</button>`,
                  )
                  .join("")}
            `;

        container.querySelectorAll(".tab").forEach((tab) => {
          tab.addEventListener("click", (e) => {
            container
              .querySelectorAll(".tab")
              .forEach((t) => t.classList.remove("active"));
            e.target.classList.add("active");
            currentCategory = e.target.dataset.category;
            renderTimeline();
          });
        });
      }

      function renderTimeline() {
        const container = document.getElementById("timelineContainer");

        const filteredEvents = allEvents.filter((event) => {
          const matchesCategory =
            currentCategory === "all" ||
            (currentViewMode === "period"
              ? event.period === currentCategory
              : event.chapter === currentCategory);
          const matchesSearch =
            !searchQuery ||
            event.event.toLowerCase().includes(searchQuery.toLowerCase());
          return matchesCategory && matchesSearch;
        });

        document.getElementById("displayedEvents").textContent =
          filteredEvents.length;

        if (filteredEvents.length === 0) {
          container.innerHTML = `
                    <div class="empty-state">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                        </svg>
                        <p>イベントがありません</p>
                    </div>
                `;
          return;
        }

        const tableHTML = `
                <table class="timeline-table">
                    <thead>
                        <tr>
                            <th style="width: 120px;">年代</th>
                            <th style="width: 40%;">出来事</th>
                            <th style="width: 15%;">${currentViewMode === "period" ? "章" : "時代"}</th>
                            <th>参考リンク</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${filteredEvents
                          .map(
                            (event) => `
                            <tr>
                                <td class="event-year">${formatYear(event.is_bc ? -Math.abs(event.year) : event.year)}</td>
                                <td class="event-title">${escapeHtml(event.event)}</td>
                                <td>
                                    ${
                                      currentViewMode === "period"
                                        ? `<span class="category-chip chapter-chip ${event.chapter}">${event.chapter}</span>`
                                        : `<span class="category-chip period-chip ${CSS.escape(event.period)}">${getPeriodLabel(event.period)}</span>`
                                    }
                                </td>
                                <td>
                                    ${
                                      event.link
                                        ? `<a href="${event.link}" target="_blank" class="event-link">🔗 詳細</a>`
                                        : "-"
                                    }
                                </td>
                            </tr>
                        `,
                          )
                          .join("")}
                    </tbody>
                </table>
            `;

        container.innerHTML = tableHTML;
      }

      function getPeriodLabel(periodValue) {
        const period = periods.find((p) => p.value === periodValue);
        return period ? period.label : periodValue;
      }
    </script>
  </body>
</html>

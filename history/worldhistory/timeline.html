<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>世界史年表 — Shoei451</title>
    <link rel="icon" href="../../images/worldhistoryquiz.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- 変更後: theme-wh.css を先に読み込む -->
    <link rel="stylesheet" href="../../css/timeline.css">
    <link rel="stylesheet" href="../styles/wh-timeline.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>📜 世界史年表</h1>
            <div class="controls">
                <input type="text" id="searchBox" class="search-box" placeholder="イベントを検索...">
                <span class="logo-switches">
                    <button id="theme-toggle" type="button" title="Toggle Theme">
                        <svg id="moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg>
                        <svg id="sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="5"></circle>
                            <line x1="12" y1="1" x2="12" y2="3"></line>
                            <line x1="12" y1="21" x2="12" y2="23"></line>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                            <line x1="1" y1="12" x2="3" y2="12"></line>
                            <line x1="21" y1="12" x2="23" y2="12"></line>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                        </svg>
                    </button>
                </span>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="stats" id="statsSection">
            <div class="stat-item">
                <div class="stat-number" id="totalEvents">-</div>
                <div class="stat-label">総イベント数</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="displayedEvents">-</div>
                <div class="stat-label">表示中</div>
            </div>
        </div>

        <div style="margin-bottom: 20px; text-align: center;">
            <label style="font-weight: 600; margin-right: 10px;">表示モード:</label>
            <select id="viewMode" style="padding: 8px 12px; border: 2px solid var(--border-light); border-radius: 5px; background: var(--bg-light); color: var(--text-light); font-size: 0.95rem;">
                <option value="period">時代別</option>
                <option value="chapter">章別</option>
            </select>
        </div>

        <div class="tabs" id="categoryTabs"></div>

        <div id="timelineContainer">
            <div class="loading">読み込み中...</div>
        </div>
    </div>

    <script>
        // Supabase Configuration
        const SUPABASE_URL = 'https://gjuqsyaugrsshmjerhme.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdqdXFzeWF1Z3Jzc2htamVyaG1lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY0NzA3NTYsImV4cCI6MjA4MjA0Njc1Nn0.V8q5ddz5tPy7wBaQ73aGtmCZyqzA6pPciPRwRIZjJcs';
        
        const timelineApiClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // State
        let allEvents = [];
        let currentCategory = 'all';
        let currentViewMode = 'period';
        let searchQuery = '';

        const periods = [
            { value: "~0", label: "紀元前" },
            { value: "1~1000", label: "1年~1000年" },
            { value: "1001~1500", label: "1001年~1500年" },
            { value: "1501~1700", label: "1501年~1700年" },
            { value: "1701~1800", label: "1701年~1800年" },
            { value: "1801~1900", label: "1801年~1900年" },
            { value: "1901~1945", label: "1901年~1945年" },
            { value: "1946~1989", label: "1946年~1989年" },
            { value: "1990~", label: "1990年~" }
        ];

        const chapters = [
            { value: "第1章", label: "古代文明圏" },
            { value: "第2章", label: "中世ヨーロッパ" },
            { value: "第3章", label: "近現代ヨーロッパ" },
            { value: "第4章", label: "東アジア（中国・モンゴル）" },
            { value: "第5章", label: "東アジア（日本・朝鮮）" },
            { value: "第6章", label: "イスラーム世界" },
            { value: "第7章", label: "南アジア・東南アジア" },
            { value: "第8章", label: "アメリカ大陸" },
            { value: "第9章", label: "第一次世界大戦" },
            { value: "第10章", label: "第二次世界大戦" },
            { value: "第11章", label: "戦後国際史" }
        ];

        // Theme handling
        (function initTheme() {
            if (localStorage.getItem("pref-theme") === "dark") {
                document.body.classList.add('dark');
            } else if (localStorage.getItem("pref-theme") === "light") {
                document.body.classList.remove('dark');
            } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.body.classList.add('dark');
            }
        })();

        document.addEventListener('DOMContentLoaded', function() {
            const themeToggle = document.getElementById('theme-toggle');
            if (themeToggle) {
                themeToggle.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    document.body.classList.toggle('dark');
                    if (document.body.classList.contains('dark')) {
                        localStorage.setItem('pref-theme', 'dark');
                    } else {
                        localStorage.setItem('pref-theme', 'light');
                    }
                });
            }

            init();
        });

        async function init() {
            await loadEvents();
            setupEventListeners();
            renderTabs();
            renderTimeline();
        }

        async function loadEvents() {
            try {
                let allQuestions = [];
                let start = 0;
                const batchSize = 1000;

                while (true) {
                    const { data, error } = await timelineApiClient
                        .from('world_history_quiz')
                        .select('*')
                        .order('is_bc', { ascending: false })
                        .order('year', { ascending: true })
                        .range(start, start + batchSize - 1);

                    if (error) throw error;
                    if (!data || data.length === 0) break;

                    allQuestions.push(...data);
                    if (data.length < batchSize) break;
                    start += batchSize;
                }

                allEvents = allQuestions;
                document.getElementById('totalEvents').textContent = allEvents.length;
            } catch (error) {
                console.error('Error loading events:', error);
                document.getElementById('timelineContainer').innerHTML = `
                    <div class="empty-state">
                        <p>⚠️ データの読み込みに失敗しました</p>
                    </div>
                `;
            }
        }

        function setupEventListeners() {
            document.getElementById('searchBox').addEventListener('input', (e) => {
                searchQuery = e.target.value;
                renderTimeline();
            });

            document.getElementById('viewMode').addEventListener('change', (e) => {
                currentViewMode = e.target.value;
                currentCategory = 'all';
                renderTabs();
                renderTimeline();
            });
        }

        function renderTabs() {
            const container = document.getElementById('categoryTabs');
            const categories = currentViewMode === 'period' ? periods : chapters;

            container.innerHTML = `
                <button class="tab active" data-category="all">すべて</button>
                ${categories.map(cat => 
                    `<button class="tab" data-category="${cat.value}">${cat.label}</button>`
                ).join('')}
            `;

            container.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', (e) => {
                    container.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    e.target.classList.add('active');
                    currentCategory = e.target.dataset.category;
                    renderTimeline();
                });
            });
        }

        function renderTimeline() {
            const container = document.getElementById('timelineContainer');

            const filteredEvents = allEvents.filter(event => {
                const matchesCategory = currentCategory === 'all' || 
                    (currentViewMode === 'period' ? event.period === currentCategory : event.chapter === currentCategory);
                const matchesSearch = !searchQuery || 
                    event.event.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesCategory && matchesSearch;
            });

            document.getElementById('displayedEvents').textContent = filteredEvents.length;

            if (filteredEvents.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                        </svg>
                        <p>イベントがありません</p>
                    </div>
                `;
                return;
            }

            const tableHTML = `
                <table class="timeline-table">
                    <thead>
                        <tr>
                            <th style="width: 120px;">年代</th>
                            <th style="width: 40%;">出来事</th>
                            <th style="width: 15%;">${currentViewMode === 'period' ? '章' : '時代'}</th>
                            <th>参考リンク</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${filteredEvents.map(event => `
                            <tr>
                                <td class="event-year">${formatYear(event)}</td>
                                <td class="event-title">${escapeHtml(event.event)}</td>
                                <td>
                                    ${currentViewMode === 'period' 
                                        ? `<span class="category-chip chapter-chip ${event.chapter}">${event.chapter}</span>`
                                        : `<span class="category-chip period-chip ${CSS.escape(event.period)}">${getPeriodLabel(event.period)}</span>`
                                    }
                                </td>
                                <td>
                                    ${event.link 
                                        ? `<a href="${event.link}" target="_blank" class="event-link">🔗 詳細</a>` 
                                        : '-'
                                    }
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;

            container.innerHTML = tableHTML;
        }

        function formatYear(event) {
            return event.is_bc ? `前${event.year}年` : `${event.year}年`;
        }

        function getPeriodLabel(periodValue) {
            const period = periods.find(p => p.value === periodValue);
            return period ? period.label : periodValue;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>

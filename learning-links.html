<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Links for Learning — Shoei451</title>
  <link rel="icon" type="image/x-icon" href="images/favicon.ico" />
  <link rel="stylesheet" href="css/common.css" />

  <style>
    /* ===== Embed Container ===== */
    .embed-wrapper {
      max-width: 1100px;
      margin: 60px auto 100px;
      padding: 0 20px;
    }

    .embed-card {
      background: var(--card-bg);
      border-radius: 25px;
      box-shadow: 0 15px 40px var(--shadow);
      padding: 25px;
      overflow: hidden;
      animation: fadeInUp 0.6s ease-out forwards;
    }

    .embed-card iframe {
      width: 100%;
      height: 500px;
      border: 0;
      border-radius: 15px;
      background: var(--theme);
    }

    @media (max-width: 768px) {
      .embed-card iframe {
        height: 420px;
      }
    }
  </style>
</head>

<body>

<!-- Theme Toggle -->
<span class="logo-switches" id="theme-toggle-container"></span>

<header>
  <h1>Links for Learning</h1>
  <p>Raindrop.io に保存したリンク一覧</p>
</header>

<main class="intro">
  <a href="index.html" class="back-link">Back to Home</a>
  <h2>Bookmark Collection</h2>
  <p>
    学習に役立つ外部ウェブサイトのリンク集を紹介します。<br>  
    リンク集は Raindrop.io で管理しています。
  </p>
</main>

<section class="embed-wrapper">
  <div class="embed-card">
    <iframe
      src="https://raindrop.io/Shoei451/embed/me"
      allowfullscreen
      loading="lazy">
    </iframe>
  </div>
</section>

<footer>
  <p>Curated by Shoei451</p>
</footer>

<script src="js/theme-toggle.js"></script>

</body>
</html>

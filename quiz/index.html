<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz — Shoei451</title>
    <link rel="icon" href="/images/favicon.ico" />
    <link rel="stylesheet" href="/css/theme-toggle.css" />
    <link rel="stylesheet" href="/quiz-components/quiz-shell.css" />
    <link rel="stylesheet" href="/quiz-components/start/start-screen.css" />
    <link rel="stylesheet" href="/quiz-components/progress/progress.css" />
    <link rel="stylesheet" href="/quiz-components/question/question-area.css" />
    <link rel="stylesheet" href="/quiz-components/answer/answer.css" />
    <link rel="stylesheet" href="/quiz-components/feedback/feedback.css" />
    <link rel="stylesheet" href="/quiz-components/result/result.css" />
    <style>
      /* quiz.html 固有の最小スタイル。コンポーネントスタイルは /quiz-components/ 以下に集約済み。*/
      .qz-state-msg {
        text-align: center;
        padding: var(--qz-space-lg) var(--qz-space-sm);
        color: var(--qz-text-sub);
        font-size: 0.95rem;
        min-height: 80px;
      }
    </style>
  </head>
  <body>
    <span class="logo-switches" id="theme-toggle-container"></span>

    <header class="qz-header" id="qz-header">
      <div class="qz-header__inner">
        <div class="qz-header__title-wrap">
          <div class="qz-header__title" id="qz-header-title">Quiz</div>
          <div class="qz-header__subtitle" id="qz-header-subtitle"></div>
        </div>
        <div class="qz-header__actions">
          <a class="qz-btn qz-btn--ghost qz-btn--sm" id="qz-back-link" href="/">
            ホーム
          </a>
          <span class="logo-switches" id="theme-toggle-container-header"></span>
        </div>
      </div>
    </header>

    <main class="qz-container">
      <div id="start-screen" class="qz-screen hidden"></div>

      <div id="quiz-screen" class="qz-screen hidden">
        <div id="qz-progress-bar"></div>
        <div id="qz-question-area"></div>
        <div id="qz-choices"></div>
        <div id="qz-text-input"></div>
        <div id="qz-feedback" class="hidden"></div>
        <div id="qz-nav-buttons"></div>
      </div>

      <div id="result-screen" class="qz-screen hidden"></div>

      <div id="state-msg" class="qz-state-msg"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      window.__supabaseConfigReady = import("/js/supabase_config.js").then(
        ({ db, tables }) => {
          window.db = db;
          window._db = db;
          window.SUPABASE_TABLES = tables;
        },
      );
    </script>
    <script src="/quiz-components/wh-utils.js"></script>
    <script src="/quiz-components/start/start-screen.js"></script>
    <script src="/quiz-components/progress/progress.js"></script>
    <script src="/quiz-components/question/question-area.js"></script>
    <script src="/quiz-components/feedback/feedback.js"></script>
    <script src="/quiz-components/result/result.js"></script>
    <script src="/js/theme-toggle.js"></script>

    <script>
      const BASE = "/";

      async function loadScript(src) {
        return new Promise((resolve, reject) => {
          const s = document.createElement("script");
          s.src = src;
          s.onload = resolve;
          s.onerror = () => reject(new Error("Failed to load: " + src));
          document.head.appendChild(s);
        });
      }

      async function boot() {
        await window.__supabaseConfigReady;

        const slug = new URLSearchParams(location.search).get("slug");
        if (!slug) {
          document.getElementById("state-msg").textContent =
            "slug パラメータが指定されていません。";
          return;
        }

        // Load quiz config
        await loadScript(BASE + "quiz/config/" + slug + ".js");
        const cfg = window.QUIZ_CONFIG;
        if (!cfg) {
          document.getElementById("state-msg").textContent =
            "QUIZ_CONFIG が定義されていません: " + slug;
          return;
        }

        // Apply header
        document.title = cfg.title + " — Shoei451";
        document.getElementById("qz-header-title").textContent = cfg.title;
        if (cfg.subtitle) {
          document.getElementById("qz-header-subtitle").textContent =
            cfg.subtitle;
        }
        if (cfg.backLink) {
          const backEl = document.getElementById("qz-back-link");
          backEl.href = cfg.backLink;
          backEl.textContent = cfg.backLabel ?? "戻る";
        }
        if (cfg.accentColor) {
          document.documentElement.style.setProperty(
            "--qz-accent",
            cfg.accentColor,
          );
        }

        // Load answer component based on answerType
        const answerScript =
          cfg.answerType === "text"
            ? BASE + "quiz-components/answer/text-input.js"
            : BASE + "quiz-components/answer/choice-buttons.js";
        await loadScript(answerScript);

        // Load quiz logic and start
        await loadScript(BASE + "quiz/logic.js");
        window.initQuizLogic(cfg);
      }

      boot().catch((err) => {
        document.getElementById("state-msg").textContent =
          "読み込みエラー: " + err.message;
        console.error(err);
      });
    </script>
  </body>
</html>

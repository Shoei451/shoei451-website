<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>王朝詳細 — 中国史ノート</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="css/dynasty.css" />
  </head>
  <body>
    <button
      class="toc-toggle"
      id="tocToggle"
      type="button"
      aria-label="目次の開閉"
      aria-controls="toc"
      aria-expanded="false"
    >
      <span class="icon">☰</span>
      <span class="label">目次</span>
    </button>

    <!-- ════════════════════════════════
     HEADER（451-docs 準拠）
════════════════════════════════ -->
    <header class="site-header">
      <!-- 左: 戻る + 王朝名 -->
      <div class="header-left">
        <a class="header-back" href="index.html" id="headerBack">← 一覧</a>
        <span class="header-dynasty-name" id="dynastyName"></span>
        <span class="header-meta" id="dynastyMeta"></span>
      </div>

      <!-- 右: タブ（note-style の bg-box スタイル） -->
      <div class="header-tabs" id="tabBar">
        <button
          class="tab-btn active"
          id="btnSummary"
          onclick="switchTab('summary')"
        >
          まとめ
        </button>
        <button class="tab-btn" id="btnQuiz" onclick="switchTab('quiz')">
          穴埋め
        </button>
        <button
          class="tab-btn"
          id="btnTimeline"
          onclick="switchTab('timeline')"
        >
          年表
        </button>
        <button class="tab-btn" id="btnFigures" onclick="switchTab('figures')">
          人物
        </button>
      </div>
    </header>

    <!-- ════════════════════════════════
     SIDEBAR（451-docs 準拠: position:fixed）
════════════════════════════════ -->
    <div class="overlay" id="overlay"></div>

    <aside class="toc" id="toc">
      <p class="toc-label">目次</p>
      <nav id="navList"></nav>
    </aside>

    <!-- ════════════════════════════════
     MAIN（中央カラム）
════════════════════════════════ -->
    <main class="article" id="article">
      <!-- ── まとめタブ ── -->
      <div class="tab-panel" id="panelSummary" style="display: block">
        <div class="loading-state" id="loadingSummary">
          <div class="loading-spinner"></div>
          読み込み中
        </div>
        <div
          class="markdown-body"
          id="summaryContent"
          style="display: none"
        ></div>
      </div>

      <!-- ── 穴埋めタブ（note-app.js 準拠） ── -->
      <div class="tab-panel" id="panelQuiz" style="display: none">
        <div class="quiz-controls" id="quizControls" style="display: none">
          <!-- components.md の pill-toggle（まとめ/穴埋めモード切替） -->
          <div class="pill-toggle" id="clozeMode">
            <button class="pill-toggle__btn" onclick="revealAll()">
              すべて表示
            </button>
            <button class="pill-toggle__btn active" onclick="hideAll()">
              すべて隠す
            </button>
          </div>
          <!-- components.md の badge -->
          <span class="quiz-score">
            <span class="badge badge--neutral" id="quizScore">0 / 0</span>
          </span>
        </div>
        <div class="quiz-wrap" id="quizWrap">
          <div class="empty-state" id="quizEmpty" style="display: none">
            <span>📝</span>このノートには穴埋め語句（⟦⟦…⟧⟧）がありません。
          </div>
        </div>
      </div>

      <!-- ── 年表タブ ── -->
      <div class="tab-panel" id="panelTimeline" style="display: none">
        <div class="tl-list" id="timelineContent"></div>
      </div>

      <!-- ── 人物タブ ── -->
      <div class="tab-panel" id="panelFigures" style="display: none">
        <div id="figuresContent"></div>
      </div>
    </main>

    <!-- トースト -->
    <div class="toast" id="toast"></div>

    <!-- ── Scripts ── -->
    <script src="js/common/events.js"></script>
    <script src="js/common/quizdata.js"></script>
    <script src="js/common/dynasties.js"></script>
    <script src="js/common/icons.js"></script>
    <script src="js/dynasty.js"></script>
  </body>
</html>

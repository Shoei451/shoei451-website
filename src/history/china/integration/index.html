<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>chinese-history-note</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/index.css" />
  </head>
  <body>
    <!-- ─── HEADER ─── -->
    <header class="site-header">
      <a class="header-logo" href="index.html">
        <span class="header-logo__dot"></span>
        中国史ノート
      </a>
      <nav class="header-nav">
        <a href="index.html" class="active">一覧</a>
        <a href="map.html">変遷図</a>
        <a href="timeline.html">年表</a>
        <a href="culture-quiz.html">クイズ</a>
      </nav>
    </header>

    <!-- ─── SEARCH ─── -->
    <div class="search-wrap">
      <input
        class="search-input"
        id="searchInput"
        type="text"
        placeholder="王朝名・時代・都・人物・制度・イベントを検索… (⌘K)"
        autocomplete="off"
        oninput="handleSearch(this.value)"
      />
    </div>

    <!-- ─── MAIN ─── -->
    <main class="page-main">
      <!-- ツールへのリンク -->
      <div class="tool-links">
        <a class="tool-link" href="map.html">
          <span class="tool-link__icon">🗺️</span> 王朝変遷図
        </a>
        <a class="tool-link" href="timeline.html">
          <span class="tool-link__icon">📜</span> 年表
        </a>
        <a class="tool-link" href="culture-quiz.html">
          <span class="tool-link__icon">🎯</span> 文化史クイズ
        </a>
      </div>

      <!-- 王朝グリッド（JSで生成） -->
      <div id="dynastyContainer"></div>
      <p class="search-empty" id="searchEmpty">
        「<span id="searchQuery"></span>」に一致する王朝がありません。
      </p>
    </main>

    <!-- ─── SCRIPTS ─── -->
    <script src="js/common/dynasties.js"></script>
    <script src="js/common/events.js"></script>
    <script src="js/common/quizdata.js"></script>
    <script src="js/common/search.js"></script>
    <script src="js/card-render.js"></script>
  </body>
</html>

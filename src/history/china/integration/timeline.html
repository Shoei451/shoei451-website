<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>年表 — chinese-history-note</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/timeline.css" />
  </head>
  <body>
    <!-- ─── HEADER ─── -->
    <header class="site-header">
      <a class="header-logo" href="index.html">
        <span class="header-logo__dot"></span>
        中国史ノート
      </a>
      <nav class="header-nav">
        <a href="index.html">一覧</a>
        <a href="map.html">変遷図</a>
        <a href="timeline.html" class="active">年表</a>
        <a href="culture-quiz.html">クイズ</a>
      </nav>
    </header>

    <!-- ─── MAIN ─── -->
    <div class="page-wrap">
      <div class="page-title">
        <h1>中国史 年表</h1>
        <p id="pageSubtitle">読み込み中…</p>
      </div>

      <!-- コントロール（sticky） -->
      <div class="controls">
        <div class="search-row">
          <input
            class="search-input"
            id="searchInput"
            type="text"
            placeholder="イベント名・人物・制度を検索…"
            autocomplete="off"
            oninput="handleSearch(this.value)"
          />
          <span class="result-count" id="resultCount"></span>
        </div>

        <!-- カテゴリ pill toggle -->
        <div class="pill-toggle" id="catToggle">
          <button
            class="pill-btn active"
            data-cat="all"
            onclick="setCategory('all')"
          >
            すべて
          </button>
          <button
            class="pill-btn"
            data-cat="王朝成立"
            style="--cat-color: #fff8e1; --cat-text: #e65100"
            onclick="setCategory('王朝成立')"
          >
            👑 王朝成立
          </button>
          <button
            class="pill-btn"
            data-cat="王朝滅亡"
            style="--cat-color: #fce4ec; --cat-text: #880e4f"
            onclick="setCategory('王朝滅亡')"
          >
            💥 王朝滅亡
          </button>
          <button
            class="pill-btn"
            data-cat="戦争"
            style="--cat-color: #ffebee; --cat-text: #b71c1c"
            onclick="setCategory('戦争')"
          >
            ⚔️ 戦争
          </button>
          <button
            class="pill-btn"
            data-cat="反乱"
            style="--cat-color: #fbe9e7; --cat-text: #bf360c"
            onclick="setCategory('反乱')"
          >
            🔥 反乱
          </button>
          <button
            class="pill-btn"
            data-cat="外交"
            style="--cat-color: #e8f5e9; --cat-text: #1b5e20"
            onclick="setCategory('外交')"
          >
            🤝 外交
          </button>
          <button
            class="pill-btn"
            data-cat="内政"
            style="--cat-color: #e3f2fd; --cat-text: #0d47a1"
            onclick="setCategory('内政')"
          >
            🏛️ 内政
          </button>
          <button
            class="pill-btn"
            data-cat="文化"
            style="--cat-color: #f3e5f5; --cat-text: #4a148c"
            onclick="setCategory('文化')"
          >
            📚 文化
          </button>
          <button
            class="pill-btn"
            data-cat="経済"
            style="--cat-color: #e0f7fa; --cat-text: #006064"
            onclick="setCategory('経済')"
          >
            💰 経済
          </button>
        </div>
      </div>

      <!-- 年表本体 -->
      <div class="tl-container" id="tlContainer">
        <div class="loading-state">年表データを取得中</div>
      </div>
    </div>

    <!-- ─── SCRIPTS ─── -->
    <script src="js/common/dynasties.js"></script>
    <script src="js/common/events.js"></script>
    <script src="js/common/icons.js"></script>
    <script src="js/timeline.js"></script>
  </body>
</html>

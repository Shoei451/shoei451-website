<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>歴史総合 語句確認フォーム — Shoei451</title>
    <link rel="icon" href="/images/favicon.ico" />

    <script>
      (function () {
        const t = localStorage.getItem("pref-theme");
        if (
          t === "dark" ||
          (!t && matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>

    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/utils.css"" />
    <style>
      html.dark body {
        background-color: var(--color-bg);
        color: var(--color-text-primary);
      }

      .forms-section {
        margin-top: 1.5rem;
      }

      .forms-section__header {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 1rem;
      }

      .forms-section__num {
        width: 2rem;
        height: 2rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        font-size: 0.85rem;
        font-weight: 700;
        color: #0d6efd;
        background: rgba(13, 110, 253, 0.12);
      }

      .forms-section__title {
        margin: 0;
        font-size: 1.1rem;
        font-weight: 700;
      }

      .forms-card {
        height: 100%;
        transition:
          transform 0.15s ease,
          box-shadow 0.15s ease;
      }

      .forms-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.08);
      }

      .forms-card__link {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        height: 100%;
        color: inherit;
        text-decoration: none;
      }

      .forms-card__label {
        font-weight: 600;
      }

      .forms-card__arrow {
        color: #0d6efd;
        flex-shrink: 0;
      }
    </style>
  </head>

  <body>
    <div id="nav-container"></div>

    <main class="container py-4">
      <div class="page-header">
        <a href="/sub-index.html?slug=history" class="back-link mb-2">
          <i class="bi bi-chevron-left"></i> 歴史ホーム
        </a>
        <h1 class="page-header__title">歴史総合 語句確認フォーム</h1>
        <p class="page-header__desc">
          歴史総合の語句確認用 Google Forms 一覧です。
        </p>
      </div>

      <div id="forms-container" class="row g-4">
        <!-- forms-data.js + script で inject -->
      </div>
    </main>

    <footer id="site-footer"></footer>

    <script src="/js/icons.js"></script>
    <script src="/js/nav.js"></script>
    <script src="/js/theme-toggle.js"></script>

    <script>
      if (document.documentElement.classList.contains("dark")) {
        document.body.classList.add("dark");
      }
    </script>

    <script src="forms-data.js"></script>
    <script>
      const HISTORY_SECTIONS = [
        { key: "folder1", title: "19世紀のヨーロッパ・アメリカ・アジア" },
        { key: "folder2", title: "明治初期の日本" },
        { key: "folder3", title: "第二次産業革命と帝国主義" },
        { key: "folder4", title: "日清戦争・日露戦争" },
        { key: "folder5", title: "戦後世界・冷戦" },
        { key: "folder7", title: "その他・番外編" },
      ];

      const container = document.getElementById("forms-container");

      HISTORY_SECTIONS.forEach((section, index) => {
        const forms = formData[section.key] ?? [];
        if (forms.length === 0) return;

        const sectionEl = document.createElement("section");
        sectionEl.className = "col-12 forms-section";
        sectionEl.innerHTML = `
          <div class="forms-section__header">
            <span class="forms-section__num">${index + 1}</span>
            <h2 class="forms-section__title">${section.title}</h2>
          </div>
          <div class="row g-3" data-cards></div>
        `;

        const cardsEl = sectionEl.querySelector("[data-cards]");
        forms.forEach((form) => {
          const col = document.createElement("div");
          col.className = "col-12 col-md-6 col-lg-4";
          col.innerHTML = `
            <div class="card forms-card">
              <div class="card-body">
                <a
                  class="forms-card__link"
                  href="${form.url}"
                  target="_blank"
                  rel="noopener noreferrer"
                >
                  <span class="forms-card__label">${form.title}</span>
                  <i class="bi bi-box-arrow-up-right forms-card__arrow"></i>
                </a>
              </div>
            </div>
          `;
          cardsEl.appendChild(col);
        });

        container.appendChild(sectionEl);
      });
    </script>
  </body>
</html>

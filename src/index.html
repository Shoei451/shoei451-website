<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shoei451 — Home</title>
    <link rel="icon" href="/images/favicon.ico" />

    <!-- フラッシュ防止：テーマをCSSより前に適用 -->
    <script>
      (function () {
        const t = localStorage.getItem("pref-theme");
        if (
          t === "dark" ||
          (!t && matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>

    <!-- Base CSS -->
    <link rel="stylesheet" href="/css/base.css" />

    <!-- Bootstrap -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <style>
      /* html.dark → body.dark 同期 */
      html.dark body {
        background-color: var(--color-bg);
        color: var(--color-text-primary);
      }

      /* ── Countdown Section ── */
      .countdown-section {
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: 8px;
        padding: 1.25rem 1.5rem;
        margin: 2rem 2.5rem 2.5rem 2.5rem;
      }

      .countdown-toggle {
        display: flex;
        align-items: center;
        justify-content: space-between;
        cursor: pointer;
        user-select: none;
      }

      .countdown-toggle__title {
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--color-text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .countdown-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 0.75rem;
        margin-top: 1rem;
      }

      .countdown-item {
        background: var(--color-bg);
        border: 1px solid var(--color-border);
        border-radius: 6px;
        padding: 0.75rem 1rem;
      }

      .countdown-item__label {
        font-size: 0.75rem;
        color: var(--color-text-secondary);
        margin-bottom: 4px;
      }

      .countdown-item__days {
        font-size: 1.4rem;
        font-weight: 700;
        color: var(--color-accent-text);
        font-feature-settings: "tnum";
      }

      body.dark .countdown-item__days {
        color: var(--color-accent);
      }

      .countdown-item__date {
        font-size: 0.75rem;
        color: var(--color-text-secondary);
        margin-top: 2px;
      }

      /* ── Section header ── */
      .section-header {
        display: flex;
        align-items: baseline;
        gap: 0.75rem;
        margin: 2.5rem 0 1rem;
        padding-bottom: 0.5rem;
        border-bottom: 2px solid var(--color-accent);
      }

      .section-header__title {
        font-size: 1rem;
        font-weight: 700;
        margin: 0;
      }

      .section-header__desc {
        font-size: 0.85rem;
        color: var(--color-text-secondary);
        margin: 0;
      }

      /* ── Card ── */
      .site-card .card-title {
        font-size: 1rem;
        font-weight: 700;
        margin-bottom: 0.35rem;
      }

      .site-card__bi-icon {
        display: inline-block;
        font-size: 1.5rem;
        color: var(--color-accent-text);
      }

      body.dark .site-card__bi-icon {
        color: var(--color-accent);
      }

      .site-card .card-text {
        font-size: 0.875rem;
        line-height: 1.6;
      }

      /* ── Hero ── */
      .site-hero {
        padding: 2.5rem 0 1.5rem;
        border-bottom: 1px solid var(--color-border);
        margin-bottom: 2rem;
      }

      .site-hero__eyebrow {
        font-size: 0.78rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--color-accent-text);
        margin-bottom: 0.5rem;
      }

      body.dark .site-hero__eyebrow {
        color: var(--color-accent);
      }

      .site-hero__title {
        font-size: clamp(1.6rem, 4vw, 2.2rem);
        font-weight: 700;
        margin-bottom: 0.5rem;
        line-height: 1.3;
      }

      .site-hero__desc {
        font-size: 0.95rem;
        color: var(--color-text-secondary);
        max-width: 560px;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <!-- ナビバー -->
    <div id="nav-container"></div>

    <div class="container py-4">
      <!-- Hero -->
      <div class="site-hero">
        <p class="site-hero__eyebrow">@Shoei451</p>
        <h1 class="site-hero__title">My Learning Tools</h1>
        <p class="site-hero__desc">
          世界史・政経・地理・古典など、普段の学習+入試対策に役立つコンテンツ。内容は随時更新予定です。
        </p>
      </div>

      <!-- 歴史 -->
      <div class="section-header">
        <h2 class="section-header__title">歴史</h2>
        <span class="section-header__desc"
          >世界史・中国史の年代クイズ・年表</span
        >
      </div>
      <div
        class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-3"
        id="cards-history"
      ></div>

      <!-- 政治・経済 -->
      <div class="section-header">
        <h2 class="section-header__title">政治・経済</h2>
        <span class="section-header__desc">政経年代クイズ・憲法クイズ</span>
      </div>
      <div
        class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-3"
        id="cards-seikei"
      ></div>

      <!-- 地理 -->
      <div class="section-header">
        <h2 class="section-header__title">地理</h2>
        <span class="section-header__desc">地図・首都クイズ</span>
      </div>
      <div
        class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-3"
        id="cards-geography"
      ></div>

      <!-- その他 -->
      <div class="section-header">
        <h2 class="section-header__title">その他</h2>
        <span class="section-header__desc">英語・情報・古典など</span>
      </div>
      <div
        class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-3"
        id="cards-others"
      ></div>
    </div>
    <!-- カウントダウン -->
    <div class="countdown-section" id="countdown-section">
      <div
        class="countdown-toggle"
        data-bs-toggle="collapse"
        data-bs-target="#countdownBody"
        aria-expanded="true"
        aria-controls="countdownBody"
      >
        <span class="countdown-toggle__title">
          <i class="bi bi-calendar3 me-1"></i> 入試カウントダウン
        </span>
        <i
          class="bi bi-chevron-up"
          id="countdown-chevron"
          style="font-size: 0.85rem; color: var(--color-text-secondary)"
        ></i>
      </div>
      <div class="collapse show" id="countdownBody">
        <div class="countdown-grid" id="countdown-grid">
          <!-- js/countdown-widget.js が inject -->
        </div>
      </div>
    </div>

    <!-- /container -->

    <!-- フッター -->
    <footer id="site-footer"></footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Nav / Theme -->
    <script src="/js/nav.js"></script>
    <script src="/js/theme-toggle.js"></script>

    <script>
      // html.dark → body.dark 同期（フラッシュ防止スクリプトが html に付けた class を body に移す）
      if (document.documentElement.classList.contains("dark")) {
        document.body.classList.add("dark");
      }

      // ── カウントダウン chevron 更新 ──────────────────────────
      document
        .getElementById("countdownBody")
        ?.addEventListener("hide.bs.collapse", () => {
          document
            .getElementById("countdown-chevron")
            ?.classList.replace("bi-chevron-up", "bi-chevron-down");
        });
      document
        .getElementById("countdownBody")
        ?.addEventListener("show.bs.collapse", () => {
          document
            .getElementById("countdown-chevron")
            ?.classList.replace("bi-chevron-down", "bi-chevron-up");
        });

      // ── カウントダウン描画 ────────────────────────────────────
      const EXAMS = [
        { label: "東京大学 二次試験", date: "2027-02-25" },
        { label: "共通テスト", date: "2027-01-17" },
      ];

      function renderCountdown() {
        const grid = document.getElementById("countdown-grid");
        if (!grid) return;
        const today = new Date();
        today.setHours(0, 0, 0, 0);

        grid.innerHTML = EXAMS.map((exam) => {
          const target = new Date(exam.date);
          const diff = Math.ceil((target - today) / 86400000);
          const label =
            diff > 0
              ? `あと ${diff} 日`
              : diff === 0
                ? "本日"
                : `${Math.abs(diff)} 日経過`;
          const dateStr = target.toLocaleDateString("ja-JP", {
            year: "numeric",
            month: "long",
            day: "numeric",
          });
          return `
            <div class="countdown-item">
              <div class="countdown-item__label">${exam.label}</div>
              <div class="countdown-item__days">${label}</div>
              <div class="countdown-item__date">${dateStr}</div>
            </div>
          `;
        }).join("");
      }

      renderCountdown();

      // ── カードデータ読み込み（cards-data.js に依存） ─────────
      // cards-data.js が CARDS_DATA を定義していることを前提とする。
      // 定義がない場合は何も描画しない（graceful degradation）。
      function renderCards(sectionId, items) {
        const container = document.getElementById(sectionId);
        if (!container || !items?.length) return;

        container.innerHTML = items
          .map((item) => {
            const icon = item.icon
              ? /^bi-[\w-]+$/.test(item.icon)
                ? `<i class="bi ${item.icon} site-card__bi-icon mb-3" aria-hidden="true"></i>`
                : `<img src="${item.icon}" class="site-card__icon mb-3" alt="" loading="lazy">`
              : "";
            const target = item.target
              ? `target="${item.target}" rel="noopener"`
              : "";
            return `
            <div class="col">
              <a href="${item.link}" ${target} class="card h-100 text-decoration-none site-card">
                <div class="card-body">
                  ${icon}
                  <h5 class="card-title">${item.title}</h5>
                  ${item.description ? `<p class="card-text text-secondary">${item.description}</p>` : ""}
                </div>
              </a>
            </div>
          `;
          })
          .join("");
      }

      // CARDS_DATA が利用可能になったら描画
      // cards-data.js を動的ロードするか、script タグで先行ロードする場合はそのまま参照
      function tryRenderAll() {
        if (typeof CARDS_DATA === "undefined") return;
        renderCards("cards-history", CARDS_DATA.history);
        renderCards("cards-seikei", CARDS_DATA.seikei);
        renderCards("cards-geography", CARDS_DATA.geography);
        renderCards("cards-others", CARDS_DATA.miscellaneous);
      }

      // cards-data.js が後からロードされる場合に備えて遅延チェック
      tryRenderAll();
      window.addEventListener("load", tryRenderAll);
      document.addEventListener("cards-data-ready", tryRenderAll);
    </script>

    <!-- カードデータ（存在する場合） -->
    <script
      src="/js/lists-loader.js"
      onerror="console.info('lists-loader.js not found')"
    ></script>
    <script>
      tryRenderAll();
    </script>
  </body>
</html>

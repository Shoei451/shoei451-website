<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Links for Learning — Shoei451</title>
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico" />

    <!-- フラッシュ防止 -->
    <script>
      (function () {
        const t = localStorage.getItem("pref-theme");
        if (
          t === "dark" ||
          (!t && matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>

    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/index-cards.css" />
    <style>
      html.dark body {
        background-color: var(--color-bg);
        color: var(--color-text-primary);
      }

      /* ── link card ──────────────────────────────────────────
         index-card より横長。left: favicon/thumb, right: body
      ── */
      .link-card {
        display: flex;
        align-items: flex-start;
        gap: 0.75rem;
        padding: 0.85rem 1rem;
        border: 1px solid var(--color-border);
        border-radius: 8px;
        background: var(--color-surface);
        color: var(--color-text-primary);
        text-decoration: none;
        transition:
          border-color 0.15s,
          transform 0.12s,
          box-shadow 0.15s;
      }

      .link-card:hover {
        border-color: var(--color-accent);
        transform: translateY(-2px);
        box-shadow: 0 3px 12px rgba(0, 0, 0, 0.07);
        color: var(--color-text-primary);
        text-decoration: none;
      }

      body.dark .link-card:hover {
        box-shadow: 0 3px 12px rgba(0, 0, 0, 0.3);
      }

      /* favicon / cover thumb */
      .link-card__thumb {
        width: 32px;
        height: 32px;
        border-radius: 5px;
        object-fit: cover;
        flex-shrink: 0;
        background: var(--color-bg);
        border: 1px solid var(--color-border);
      }

      .link-card__thumb-placeholder {
        width: 32px;
        height: 32px;
        border-radius: 5px;
        flex-shrink: 0;
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--color-text-secondary);
        font-size: 0.8rem;
      }

      .link-card__body {
        flex: 1;
        min-width: 0;
      }

      .link-card__title {
        font-size: 0.9rem;
        font-weight: 600;
        line-height: 1.45;
        color: var(--color-text-primary);
        /* clamp to 2 lines */
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        margin-bottom: 0.2rem;
      }

      .link-card__url {
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 0.7rem;
        color: var(--color-text-secondary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        display: block;
        margin-bottom: 0.25rem;
      }

      .link-card__note {
        font-size: 0.78rem;
        color: var(--color-text-secondary);
        line-height: 1.55;
        /* clamp to 2 lines */
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        margin-bottom: 0.3rem;
      }

      .link-card__tags {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-top: 0.1rem;
      }

      .link-card__tag {
        font-size: 0.65rem;
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        padding: 1px 7px;
        border-radius: 100px;
        border: 1px solid var(--color-border);
        background: var(--color-bg);
        color: var(--color-text-secondary);
      }

      /* ── search bar ── */
      .ll-search-wrap {
        position: relative;
        max-width: 420px;
      }

      .ll-search-wrap svg {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        width: 14px;
        height: 14px;
        stroke: var(--color-text-secondary);
        fill: none;
        pointer-events: none;
      }

      .ll-search-wrap input {
        width: 100%;
        padding: 8px 14px 8px 36px;
        border: 1px solid var(--color-border);
        border-radius: 8px;
        font-size: 0.88rem;
        font-family: inherit;
        background: var(--color-surface);
        color: var(--color-text-primary);
        outline: none;
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
      }

      .ll-search-wrap input:focus {
        border-color: var(--color-accent);
        box-shadow: 0 0 0 3px rgba(250, 186, 64, 0.15);
      }

      .ll-search-wrap input::placeholder {
        color: var(--color-text-secondary);
        opacity: 0.7;
      }

      /* ── collection hub cards (index view) ── */
      .collection-card {
        display: flex;
        flex-direction: column;
        border: 1px solid var(--color-border);
        border-radius: 8px;
        background: var(--color-surface);
        color: var(--color-text-primary);
        text-decoration: none;
        padding: 0.9rem 1rem;
        transition:
          border-color 0.15s,
          transform 0.12s,
          box-shadow 0.15s;
        cursor: pointer;
      }

      .collection-card:hover {
        border-color: var(--color-accent);
        transform: translateY(-2px);
        box-shadow: 0 3px 12px rgba(0, 0, 0, 0.07);
        color: var(--color-text-primary);
        text-decoration: none;
      }

      body.dark .collection-card:hover {
        box-shadow: 0 3px 12px rgba(0, 0, 0, 0.3);
      }

      .collection-card__title {
        font-size: 0.9rem;
        font-weight: 700;
        margin-bottom: 0.2rem;
        line-height: 1.4;
      }

      .collection-card__count {
        font-size: 0.72rem;
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        color: var(--color-text-secondary);
      }

      /* ── back link (collection view) ── */
      .ll-back {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: 0.85rem;
        color: var(--color-text-secondary);
        text-decoration: none;
        padding: 0.3rem 0;
        transition: color 0.15s;
        cursor: pointer;
        background: none;
        border: none;
        font-family: inherit;
      }

      .ll-back:hover {
        color: var(--color-text-primary);
      }

      /* ── state / skeleton ── */
      .ll-state {
        padding: 3rem 0;
        text-align: center;
        color: var(--color-text-secondary);
        font-size: 0.9rem;
      }

      .ll-skeleton {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 0.75rem;
      }

      .ll-skel-item {
        height: 72px;
        border-radius: 8px;
        border: 1px solid var(--color-border);
        background: var(--color-surface);
        animation: ll-pulse 1.4s infinite ease-in-out;
      }

      @keyframes ll-pulse {
        0%,
        100% {
          opacity: 0.45;
        }
        50% {
          opacity: 0.85;
        }
      }

      /* highlight from search */
      mark.ll-mark {
        background: rgba(250, 186, 64, 0.32);
        color: inherit;
        border-radius: 2px;
        padding: 0 1px;
      }

      /* ── no-results ── */
      .ll-no-results {
        padding: 2.5rem;
        text-align: center;
        color: var(--color-text-secondary);
        font-size: 0.88rem;
        border: 1px dashed var(--color-border);
        border-radius: 8px;
      }

      /* ── link grid (2-col on wide screens) ── */
      .ll-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 0.75rem;
      }

      @media (min-width: 640px) {
        .ll-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      /* ── search row ── */
      .ll-search-row {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 1.25rem;
        flex-wrap: wrap;
      }

      .ll-search-row .ll-search-wrap {
        flex: 1 1 200px;
      }
    </style>
  </head>

  <body>
    <div id="nav-container"></div>

    <main class="container" style="padding-top: 1.5rem; padding-bottom: 1.5rem">
      <!-- header — rewritten by JS -->
      <div id="ll-header">
        <div class="page-header">
          <a href="/index.html" class="back-link" style="margin-bottom: 0.5rem">
            <i class="bi bi-chevron-left"></i> ホーム
          </a>
          <h1 class="page-header__title">Links for Learning</h1>
          <p class="page-header__desc">
            学習に役立つリンク集。Raindrop.io からコレクション別に取得。
          </p>
        </div>
      </div>

      <!-- content area -->
      <div id="ll-content">
        <!-- skeleton shown on first load -->
        <div id="ll-skeleton" class="ll-skeleton">
          <div class="ll-skel-item"></div>
          <div class="ll-skel-item"></div>
          <div class="ll-skel-item"></div>
          <div class="ll-skel-item"></div>
        </div>
      </div>
    </main>

    <footer id="site-footer"></footer>

    <script src="/js/icons.js"></script>
    <script src="/js/nav.js"></script>
    <script src="/js/theme-toggle.js"></script>

    <script>
      if (document.documentElement.classList.contains("dark")) {
        document.body.classList.add("dark");
      }
    </script>

    <script src="config.js"></script>
    <script>
      // ── API helpers ───────────────────────────────────────────
      async function apiFetch(path, extra = {}) {
        const params = new URLSearchParams({ path, ...extra });
        const res = await fetch(`/.netlify/functions/raindrop?${params}`);
        if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
        return res.json();
      }

      async function fetchCollections() {
        const data = await apiFetch("/collections");
        return data.items || [];
      }

      async function fetchRaindrops(collectionId) {
        const data = await apiFetch(`/raindrops/${collectionId}`, {
          perpage: CONFIG.PER_PAGE,
        });
        return data.items || [];
      }

      // ── URL helpers ───────────────────────────────────────────
      function getSlug() {
        return new URLSearchParams(location.search).get("slug");
      }

      function getDomain(url) {
        try {
          return new URL(url).hostname.replace(/^www\./, "");
        } catch {
          return url;
        }
      }

      function getFaviconUrl(url) {
        try {
          return `https://www.google.com/s2/favicons?domain=${new URL(url).hostname}&sz=64`;
        } catch {
          return "";
        }
      }

      // ── HTML helpers ──────────────────────────────────────────
      function esc(s) {
        return String(s ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function highlight(text, query) {
        if (!query) return esc(text);
        const safe = esc(text);
        const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        return safe.replace(
          new RegExp(`(${escaped})`, "gi"),
          '<mark class="ll-mark">$1</mark>',
        );
      }

      // ── Render: index (collection list) ──────────────────────
      function renderIndex(collections) {
        // header
        document.getElementById("ll-header").innerHTML = `
          <div class="page-header">
            <a href="/index.html" class="back-link" style="margin-bottom:0.5rem;">
              <i class="bi bi-chevron-left"></i> ホーム
            </a>
            <h1 class="page-header__title">Links for Learning</h1>
            <p class="page-header__desc">コレクションを選んでリンク一覧を表示。</p>
          </div>
        `;

        if (!collections.length) {
          document.getElementById("ll-content").innerHTML = `
            <div class="ll-no-results">
              表示できるコレクションがありません。<code>config.js</code> の
              <code>ALLOWED_COLLECTIONS</code> を確認してください。
            </div>`;
          return;
        }

        // section header + grid
        const cardsHTML = collections
          .map(
            (col) => `
          <button
            class="collection-card"
            onclick="navigateTo(${col._id})"
          >
            <div class="collection-card__title">${esc(col.title)}</div>
            <div class="collection-card__count">${col.count ?? "?"} items</div>
          </button>
        `,
          )
          .join("");

        document.getElementById("ll-content").innerHTML = `
          <div class="index-section-header" style="margin-top:0;">
            <h2 class="index-section-header__title">コレクション</h2>
          </div>
          <div class="index-card-grid" style="grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));">
            ${cardsHTML}
          </div>
        `;
      }

      // ── Render: collection detail ─────────────────────────────
      function renderCollection(collection, items) {
        document.title = `${collection.title} — Links for Learning`;

        document.getElementById("ll-header").innerHTML = `
          <div class="page-header" style="padding-bottom:0.75rem;">
            <button class="ll-back" style="margin-bottom:0.5rem;" onclick="navigateTo(null)">
              <i class="bi bi-chevron-left"></i> コレクション一覧
            </button>
            <h1 class="page-header__title">${esc(collection.title)}</h1>
            <p class="page-header__desc" style="font-size:0.82rem;">${items.length} items</p>
          </div>
        `;

        const content = document.getElementById("ll-content");

        // search bar
        content.innerHTML = `
          <div class="ll-search-row">
            <div class="ll-search-wrap">
              <svg viewBox="0 0 24 24" stroke-width="2">
                <circle cx="11" cy="11" r="8"/>
                <path d="m21 21-4.35-4.35"/>
              </svg>
              <input
                type="search"
                id="ll-search"
                placeholder="${esc(collection.title)} 内を検索…"
                autocomplete="off"
                aria-label="リンク検索"
              />
            </div>
          </div>
          <div id="ll-grid" class="ll-grid"></div>
          <div id="ll-empty" class="ll-no-results" style="display:none;">
            該当するリンクがありません。
          </div>
        `;

        // debounced search
        let timer;
        document.getElementById("ll-search").addEventListener("input", (e) => {
          clearTimeout(timer);
          timer = setTimeout(
            () => renderLinks(items, e.target.value.trim()),
            220,
          );
        });

        renderLinks(items, "");
      }

      function renderLinks(items, query) {
        const q = query.toLowerCase();
        const filtered = q
          ? items.filter(
              (item) =>
                (item.title || "").toLowerCase().includes(q) ||
                (item.note || "").toLowerCase().includes(q) ||
                (item.tags || []).some((t) => t.toLowerCase().includes(q)) ||
                getDomain(item.link).toLowerCase().includes(q),
            )
          : items;

        const grid = document.getElementById("ll-grid");
        const empty = document.getElementById("ll-empty");

        if (!filtered.length) {
          grid.innerHTML = "";
          empty.style.display = "";
          return;
        }

        empty.style.display = "none";

        grid.innerHTML = filtered
          .map((item) => {
            const domain = getDomain(item.link);
            const favicon = getFaviconUrl(item.link);
            const tags = (item.tags || []).slice(0, 6);
            const note = item.note
              ? item.note.slice(0, 120) + (item.note.length > 120 ? "…" : "")
              : "";

            const thumbHTML = favicon
              ? `<img
                  class="link-card__thumb"
                  src="${esc(favicon)}"
                  alt=""
                  loading="lazy"
                  onerror="this.replaceWith(makePlaceholder())"
                >`
              : makePlaceholderHTML();

            const tagsHTML = tags.length
              ? `<div class="link-card__tags">
                  ${tags.map((t) => `<span class="link-card__tag">${highlight(t, query)}</span>`).join("")}
                </div>`
              : "";

            const noteHTML = note
              ? `<div class="link-card__note">${highlight(note, query)}</div>`
              : "";

            return `
              <a
                href="${esc(item.link)}"
                class="link-card"
                target="_blank"
                rel="noopener noreferrer"
              >
                ${thumbHTML}
                <div class="link-card__body">
                  <div class="link-card__title">${highlight(item.title || domain, query)}</div>
                  <span class="link-card__url">${esc(domain)}</span>
                  ${noteHTML}
                  ${tagsHTML}
                </div>
              </a>
            `;
          })
          .join("");
      }

      function makePlaceholderHTML() {
        return `<div class="link-card__thumb-placeholder">
          <i class="bi bi-link-45deg"></i>
        </div>`;
      }

      // used in onerror (called from inline attr — returns DOM node)
      window.makePlaceholder = function () {
        const d = document.createElement("div");
        d.className = "link-card__thumb-placeholder";
        d.innerHTML = '<i class="bi bi-link-45deg"></i>';
        return d;
      };

      // ── Navigation ────────────────────────────────────────────
      function navigateTo(collectionId) {
        const url = collectionId
          ? `${location.pathname}?slug=${collectionId}`
          : location.pathname;
        history.pushState({}, "", url);
        boot();
      }

      window.addEventListener("popstate", boot);

      // ── Boot ─────────────────────────────────────────────────
      let _collectionsCache = null;

      async function boot() {
        const slug = getSlug();
        const content = document.getElementById("ll-content");

        // skeleton
        content.innerHTML = `
          <div class="ll-skeleton">
            <div class="ll-skel-item"></div>
            <div class="ll-skel-item"></div>
            <div class="ll-skel-item"></div>
            <div class="ll-skel-item"></div>
          </div>`;

        try {
          // fetch & cache collection list
          if (!_collectionsCache) {
            let cols = await fetchCollections();
            if (CONFIG.ALLOWED_COLLECTIONS.length > 0) {
              cols = cols.filter((c) =>
                CONFIG.ALLOWED_COLLECTIONS.includes(c._id),
              );
            }
            _collectionsCache = cols;
          }

          if (!slug) {
            renderIndex(_collectionsCache);
            return;
          }

          // collection detail
          const colId = parseInt(slug, 10);
          const collection = _collectionsCache.find((c) => c._id === colId) || {
            title: "Collection",
            _id: colId,
          };
          const items = await fetchRaindrops(colId);
          renderCollection(collection, items);
        } catch (err) {
          content.innerHTML = `
            <div class="ll-state">
              ⚠️ データの取得に失敗しました: ${esc(err.message)}
            </div>`;
          console.error(err);
        }
      }

      boot();
    </script>
  </body>
</html>

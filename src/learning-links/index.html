<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Links for Learning — Shoei451</title>
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico" />

    <!-- フラッシュ防止 -->
    <script>
      (function () {
        const t = localStorage.getItem("pref-theme");
        if (
          t === "dark" ||
          (!t && matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>

    <link rel="stylesheet" href="/css/index-cards.css" />
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/utils.css" />
    <style>
      html.dark body {
        background-color: var(--color-bg);
        color: var(--color-text-primary);
      }

      /* ── link card ── */
      .link-card {
        display: flex;
        align-items: flex-start;
        gap: 0.75rem;
        padding: 0.85rem 1rem;
        border: 1px solid var(--color-border);
        border-radius: 8px;
        background: var(--color-surface);
        color: var(--color-text-primary);
        text-decoration: none;
        transition:
          border-color 0.15s,
          transform 0.12s,
          box-shadow 0.15s;
      }
      .link-card:hover {
        border-color: var(--color-accent);
        transform: translateY(-2px);
        box-shadow: 0 3px 12px rgba(0, 0, 0, 0.07);
        color: var(--color-text-primary);
        text-decoration: none;
      }
      body.dark .link-card:hover {
        box-shadow: 0 3px 12px rgba(0, 0, 0, 0.3);
      }

      .link-card__thumb {
        width: 32px;
        height: 32px;
        border-radius: 5px;
        object-fit: cover;
        flex-shrink: 0;
        background: var(--color-bg);
        border: 1px solid var(--color-border);
      }
      .link-card__thumb-placeholder {
        width: 32px;
        height: 32px;
        border-radius: 5px;
        flex-shrink: 0;
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--color-text-secondary);
        font-size: 0.8rem;
      }
      .link-card__body {
        flex: 1;
        min-width: 0;
      }
      .link-card__title {
        font-size: 0.9rem;
        font-weight: 600;
        line-height: 1.45;
        color: var(--color-text-primary);
        display: -webkit-box;
        -webkit-line-clamp: 2;
        line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        margin-bottom: 0.2rem;
      }
      .link-card__url {
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 0.7rem;
        color: var(--color-text-secondary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        display: block;
        margin-bottom: 0.25rem;
      }
      .link-card__note {
        font-size: 0.78rem;
        color: var(--color-text-secondary);
        line-height: 1.55;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        margin-bottom: 0.3rem;
      }
      .link-card__tags {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-top: 0.1rem;
      }
      .link-card__tag {
        font-size: 0.65rem;
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        padding: 1px 7px;
        border-radius: 100px;
        border: 1px solid var(--color-border);
        background: var(--color-bg);
        color: var(--color-text-secondary);
      }

      /* ── search bar ── */
      .ll-search-wrap {
        position: relative;
      }
      .ll-search-wrap svg {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        width: 14px;
        height: 14px;
        stroke: var(--color-text-secondary);
        fill: none;
        pointer-events: none;
      }
      .ll-search-wrap input {
        width: 100%;
        padding: 8px 14px 8px 36px;
        border: 1px solid var(--color-border);
        border-radius: 8px;
        font-size: 0.88rem;
        font-family: inherit;
        background: var(--color-surface);
        color: var(--color-text-primary);
        outline: none;
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
      }
      .ll-search-wrap input:focus {
        border-color: var(--color-accent);
        box-shadow: 0 0 0 3px rgba(250, 186, 64, 0.15);
      }
      .ll-search-wrap input::placeholder {
        color: var(--color-text-secondary);
        opacity: 0.7;
      }

      /* ── back button ── */
      .ll-back {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: 0.85rem;
        color: var(--color-text-secondary);
        text-decoration: none;
        padding: 0.3rem 0;
        transition: color 0.15s;
        cursor: pointer;
        background: none;
        border: none;
        font-family: inherit;
      }
      .ll-back:hover {
        color: var(--color-text-primary);
      }

      /* ── skeleton ── */
      .ll-skeleton {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 0.75rem;
      }
      .ll-skel-item {
        height: 72px;
        border-radius: 8px;
        border: 1px solid var(--color-border);
        background: var(--color-surface);
        animation: ll-pulse 1.4s infinite ease-in-out;
      }
      @keyframes ll-pulse {
        0%,
        100% {
          opacity: 0.45;
        }
        50% {
          opacity: 0.85;
        }
      }

      /* ── misc ── */
      mark.ll-mark {
        background: rgba(250, 186, 64, 0.32);
        color: inherit;
        border-radius: 2px;
        padding: 0 1px;
      }
      .ll-state {
        padding: 3rem 0;
        text-align: center;
        color: var(--color-text-secondary);
        font-size: 0.9rem;
      }
      .ll-no-results {
        padding: 2.5rem;
        text-align: center;
        color: var(--color-text-secondary);
        font-size: 0.88rem;
        border: 1px dashed var(--color-border);
        border-radius: 8px;
      }
    </style>
  </head>

  <body>
    <div id="nav-container"></div>

    <main class="container py-4">
      <!-- header — rewritten by JS -->
      <div id="ll-header">
        <div class="page-header">
          <a href="/index.html" class="back-link" style="margin-bottom: 0.5rem">
            <i class="bi bi-chevron-left"></i> ホーム
          </a>
          <h1 class="page-header__title">Links for Learning</h1>
          <p class="page-header__desc">
            学習に役立つリンク集。Raindrop.io からコレクション別に取得。
          </p>
        </div>
      </div>

      <!-- content area -->
      <div id="ll-content">
        <!-- skeleton shown on first load -->
        <div id="ll-skeleton" class="ll-skeleton">
          <div class="ll-skel-item"></div>
          <div class="ll-skel-item"></div>
          <div class="ll-skel-item"></div>
          <div class="ll-skel-item"></div>
        </div>
      </div>
    </main>

    <footer id="site-footer"></footer>

    <script src="/js/icons.js"></script>
    <script src="/js/nav.js"></script>
    <script src="/js/theme-toggle.js"></script>

    <script>
      if (document.documentElement.classList.contains("dark")) {
        document.body.classList.add("dark");
      }
    </script>

    <script src="config.js"></script>
    <script src="logic.js"></script>
  </body>
</html>

<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>生物基礎 語句確認フォーム — Shoei451</title>
    <link rel="icon" type="image/x-icon" href="/images/biology.png" />

    <script>
      (function () {
        const t = localStorage.getItem("pref-theme");
        if (
          t === "dark" ||
          (!t && matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>

    <link rel="stylesheet" href="/css/base.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <style>
      html.dark body {
        background-color: var(--color-bg);
        color: var(--color-text-primary);
      }

      .forms-search {
        max-width: 760px;
        position: relative;
        display: flex;
        align-items: center;
      }

      .forms-search__icon {
        position: absolute;
        left: 0.9rem;
        color: #6c757d;
      }
      .forms-search input {
        display: block;
      }
      .forms-search .form-control {
        padding-left: 2.5rem;
      }

      .forms-search__count {
        min-height: 1.5rem;
        margin-top: 0.5rem;
        font-size: 0.875rem;
        color: #6c757d;
        text-align: right;
      }

      .forms-section {
        margin-top: 1.5rem;
      }

      .forms-section__header {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 1rem;
      }

      .forms-section__num {
        width: 2rem;
        height: 2rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        font-size: 0.85rem;
        font-weight: 700;
        color: #198754;
        background: rgba(25, 135, 84, 0.12);
      }

      .forms-section__title {
        margin: 0;
        font-size: 1.1rem;
        font-weight: 700;
      }

      .forms-section__note {
        margin-bottom: 1rem;
        padding: 0.75rem 1rem;
        border-left: 4px solid #198754;
        border-radius: 0.5rem;
        background: rgba(25, 135, 84, 0.08);
        font-size: 0.9rem;
        color: #495057;
      }

      .forms-card {
        height: 100%;
        transition:
          transform 0.15s ease,
          box-shadow 0.15s ease;
      }

      .forms-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.08);
      }

      .forms-card__link {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        height: 100%;
        color: inherit;
        text-decoration: none;
      }

      .forms-card__label {
        font-weight: 600;
      }

      .forms-card__arrow {
        color: #198754;
        flex-shrink: 0;
      }

      .forms-note {
        margin-top: 3rem;
      }
    </style>
  </head>

  <body>
    <div id="nav-container"></div>

    <main class="container py-4">
      <div class="page-header">
        <a href="/sub-index.html?slug=others" class="back-link mb-2">
          <i class="bi bi-chevron-left"></i> Others
        </a>
        <h1 class="page-header__title">生物基礎 語句確認フォーム</h1>
        <p class="page-header__desc">
          生物基礎の語句確認用 Google Forms 一覧です。
        </p>
      </div>

      <div class="forms-search position-relative mb-4">
        <i class="bi bi-search forms-search__icon"></i>
        <input
          id="search"
          class="form-control"
          type="text"
          placeholder="キーワード検索（例：DNA / 免疫 / タンパク質）"
          aria-label="フォームを検索"
          autocomplete="off"
        />
        <div class="forms-search__count" id="search-count"></div>
      </div>

      <div
        id="no-results"
        class="alert alert-light border d-none"
        role="status"
      >
        「<span id="no-results-q"></span
        >」に一致するフォームが見つかりませんでした。
      </div>

      <div id="forms-container" class="row g-4">
        <!-- list.js + script で inject -->
      </div>

      <section class="card forms-note">
        <div class="card-body">
          <h2 class="h5 mb-3">Note</h2>
          <p class="mb-2">
            生物教師 Y.T
            先生による語句確認用フォームを、サイト制作者が集めたものです。
          </p>
          <p class="mb-2">学習目的以外での利用はお控えください。</p>
          <p class="mb-2">
            なお、一部フォームは学校のアカウントでしか回答できないようになっています。
          </p>
          <p class="mb-0">
            フォーム制作は学校の先生によるもので、サイト制作者はフォームの制作に関わっていません。
          </p>
        </div>
      </section>
    </main>

    <footer id="site-footer"></footer>

    <script src="/js/icons.js"></script>
    <script src="/js/nav.js"></script>
    <script src="/js/theme-toggle.js"></script>

    <script>
      if (document.documentElement.classList.contains("dark")) {
        document.body.classList.add("dark");
      }
    </script>

    <script src="forms-data.js"></script>
    <script>
      const container = document.getElementById("forms-container");
      const noResults = document.getElementById("no-results");
      const noQ = document.getElementById("no-results-q");
      const countEl = document.getElementById("search-count");
      const searchBox = document.getElementById("search");

      function render(query = "") {
        const q = query.toLowerCase().trim();
        container.innerHTML = "";

        let total = 0;
        let matched = 0;

        DATA.forEach((section) => {
          const filteredItems = section.items.filter((item) => {
            total++;
            if (!q) {
              matched++;
              return true;
            }

            const hit =
              item.keywords.toLowerCase().includes(q) ||
              item.label.toLowerCase().includes(q);
            if (hit) matched++;
            return hit;
          });

          if (filteredItems.length === 0) return;

          const sectionEl = document.createElement("section");
          sectionEl.className = "col-12 forms-section";
          sectionEl.innerHTML = `
            <div class="forms-section__header">
              <span class="forms-section__num">${section.id}</span>
              <h2 class="forms-section__title">${section.title}</h2>
            </div>
            ${
              section.restricted
                ? '<p class="forms-section__note">このセクションのフォームは学校アカウントでのみ開けます。</p>'
                : ""
            }
            <div class="row g-3" data-cards></div>
          `;

          const cardsEl = sectionEl.querySelector("[data-cards]");
          filteredItems.forEach((item) => {
            const col = document.createElement("div");
            col.className = "col-12 col-md-6 col-lg-4";
            col.innerHTML = `
              <div class="card forms-card">
                <div class="card-body">
                  <a
                    class="forms-card__link"
                    href="${item.url}"
                    target="_blank"
                    rel="noopener noreferrer"
                  >
                    <span class="forms-card__label">${item.label}</span>
                    <i class="bi bi-box-arrow-up-right forms-card__arrow"></i>
                  </a>
                </div>
              </div>
            `;
            cardsEl.appendChild(col);
          });

          container.appendChild(sectionEl);
        });

        noResults.classList.toggle("d-none", !(q && matched === 0));
        noQ.textContent = query;
        countEl.textContent = q ? `${matched} / ${total} 件一致` : "";
      }

      let timer;
      searchBox.addEventListener("input", () => {
        clearTimeout(timer);
        timer = setTimeout(() => render(searchBox.value), 120);
      });

      render();
    </script>
  </body>
</html>

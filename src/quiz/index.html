<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz — Shoei451</title>
    <link rel="icon" href="/images/favicon.ico" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#faba40" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Shoei451" />
    <link rel="apple-touch-icon" href="/images/favicon.png" />

    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/quiz/components/quiz-bundle.css" />
    <style>
      .qz-state-msg {
        text-align: center;
        padding: var(--qz-space-lg) var(--qz-space-sm);
        color: var(--qz-text-sub);
        font-size: 0.95rem;
        min-height: 80px;
      }

      .hex-color-preview {
        width: 100%;
        max-width: 320px;
        height: 80px;
        margin: var(--qz-space-xs) auto;
        border: 1.5px solid var(--qz-border);
        border-radius: var(--qz-radius-md);
        transition: background-color 0.2s;
      }

      .hex-ascii-btn-wrap {
        display: flex;
        justify-content: flex-start;
        margin-top: var(--qz-space-xs);
      }

      .idiom-feedback-card {
        background: var(--qz-surface-2);
        border-radius: var(--qz-radius-md);
        overflow: hidden;
        box-shadow: var(--qz-shadow-sm);
        margin-top: 10px;
      }

      .idiom-feedback-card__header {
        padding: 14px 18px;
        font-size: 1rem;
        font-weight: 700;
        color: #fff;
      }

      .idiom-feedback-card__header.is-correct {
        background: linear-gradient(135deg, var(--qz-correct), #22c55e);
      }

      .idiom-feedback-card__header.is-incorrect {
        background: linear-gradient(135deg, var(--qz-incorrect), #ef4444);
      }

      .idiom-feedback-card__body {
        padding: 16px 18px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .idiom-field {
        background: var(--qz-surface);
        border-left: 3px solid var(--qz-accent);
        border-radius: 0 var(--qz-radius-sm) var(--qz-radius-sm) 0;
        padding: 10px 14px;
      }

      .idiom-field__label {
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--qz-accent);
        margin-bottom: 4px;
      }

      body.dark .idiom-field__label {
        color: var(--qz-accent);
      }

      .idiom-field__value {
        font-size: 0.95rem;
        color: var(--qz-text);
        line-height: 1.6;
      }

      .idiom-field__value.is-idiom {
        font-size: 1.15rem;
        font-weight: 700;
      }

      .idiom-field__value.is-example {
        font-style: italic;
        font-weight: 600;
        background: rgba(250, 186, 64, 0.08);
        padding: 6px 10px;
        border-radius: var(--qz-radius-sm);
        margin-top: 4px;
      }

      .report-section {
        margin-top: 14px;
        padding: 12px 14px;
        background: var(--qz-surface);
        border: 1.5px solid #f97316;
        border-radius: var(--qz-radius-sm);
      }

      .report-section__title {
        font-size: 0.82rem;
        font-weight: 700;
        color: #f97316;
        margin-bottom: 10px;
      }

      .report-btn {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 6px 14px;
        background: #f97316;
        color: #fff;
        border: none;
        border-radius: var(--qz-radius-sm);
        font-family: inherit;
        font-size: 0.82rem;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.15s;
      }

      .report-btn:hover {
        opacity: 0.85;
      }

      .report-form {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .report-form select {
        padding: 8px 10px;
        border: 1.5px solid var(--qz-border);
        border-radius: var(--qz-radius-sm);
        background: var(--qz-surface-2);
        color: var(--qz-text);
        font-family: inherit;
        font-size: 0.85rem;
      }

      .report-form-actions {
        display: flex;
        gap: 8px;
      }

      .report-form-actions button {
        padding: 6px 14px;
        font-size: 0.82rem;
        font-weight: 600;
        border: none;
        border-radius: var(--qz-radius-sm);
        cursor: pointer;
        font-family: inherit;
      }

      .report-submit-btn {
        background: #f97316;
        color: #fff;
      }

      .report-cancel-btn {
        background: var(--qz-surface-2);
        color: var(--qz-text-sub);
        border: 1px solid var(--qz-border);
      }

      .report-message {
        font-size: 0.82rem;
        font-weight: 600;
        text-align: center;
        min-height: 1.2em;
      }

      .report-message.is-success {
        color: var(--qz-correct);
      }

      .report-message.is-error {
        color: var(--qz-incorrect);
      }

      .hex-ascii-table {
        border-collapse: collapse;
        font-size: 0.82rem;
        white-space: nowrap;
      }

      .hex-ascii-table th {
        padding: 8px 10px;
        text-align: center;
        font-weight: 700;
        color: #fff;
        background: var(--qz-accent);
        border: 1px solid rgba(255, 255, 255, 0.15);
      }

      .hex-ascii-table td {
        padding: 7px 10px;
        text-align: center;
        color: var(--qz-text);
        background: var(--qz-surface);
        border: 1px solid var(--qz-border);
        transition: background 0.1s;
      }

      .hex-ascii-table tr:hover td {
        background: var(--qz-accent-light);
      }

      .hex-ascii-corner {
        font-size: 0.72rem;
        line-height: 1.4;
        background: var(--qz-accent-dark) !important;
      }

      .hex-ascii-ctrl {
        font-size: 0.72rem;
        color: var(--qz-text-sub);
      }

      @media (max-width: 600px) {
        .hex-ascii-table {
          font-size: 0.72rem;
        }

        .hex-ascii-table th,
        .hex-ascii-table td {
          padding: 5px 6px;
        }
      }
    </style>
  </head>
  <body>
    <header class="qz-header" id="qz-header">
      <div class="qz-header__inner">
        <div class="qz-header__title-wrap">
          <div class="qz-header__title" id="qz-header-title">Quiz</div>
          <div class="qz-header__subtitle" id="qz-header-subtitle"></div>
        </div>
        <div class="qz-header__actions">
          <a class="qz-btn qz-btn--ghost qz-btn--sm" id="qz-back-link" href="/">
            ホーム
          </a>
          <span class="logo-switches" id="theme-toggle-container"></span>
        </div>
      </div>
    </header>

    <main class="qz-container">
      <div id="start-screen" class="qz-screen hidden"></div>

      <div id="quiz-screen" class="qz-screen hidden">
        <div id="qz-progress-bar"></div>
        <div id="qz-question-area"></div>
        <div id="qz-question-extras"></div>
        <div id="qz-choices"></div>
        <div id="qz-text-input"></div>
        <div id="qz-feedback" class="hidden"></div>
        <div id="qz-nav-buttons"></div>
      </div>

      <div id="result-screen" class="qz-screen hidden"></div>

      <div id="state-msg" class="qz-state-msg"></div>
    </main>

    <script src="/quiz/components/answer/choice-buttons.js"></script>
    <script src="/quiz/components/answer/text-input.js"></script>
    <script src="/js/wh-utils.js"></script>
    <script src="/quiz/components/start/start-screen.js"></script>
    <script src="/quiz/components/progress/progress.js"></script>
    <script src="/quiz/components/question/question-area.js"></script>
    <script src="/quiz/components/feedback/feedback.js"></script>
    <script src="/quiz/components/result/result.js"></script>
    <script src="/quiz/components/modal/modal.js"></script>
    <script src="/js/theme-toggle.js"></script>

    <script>
      const BASE = "/";

      function loadScript(src) {
        return new Promise((resolve, reject) => {
          const s = document.createElement("script");
          s.src = src;
          s.onload = resolve;
          s.onerror = () => reject(new Error("Failed to load: " + src));
          document.head.appendChild(s);
        });
      }

      function applyHeader(cfg) {
        document.title = cfg.title + " — Shoei451";
        document.getElementById("qz-header-title").textContent = cfg.title;
        if (cfg.subtitle) {
          document.getElementById("qz-header-subtitle").textContent =
            cfg.subtitle;
        }
        if (cfg.backLink) {
          const backEl = document.getElementById("qz-back-link");
          backEl.href = cfg.backLink;
          backEl.textContent = cfg.backLabel ?? "戻る";
        }
        if (cfg.accentColor) {
          document.documentElement.style.setProperty(
            "--qz-accent",
            cfg.accentColor,
          );
        }
      }

      async function boot() {
        const slug = new URLSearchParams(location.search).get("slug");
        if (!slug) {
          document.getElementById("state-msg").textContent =
            "slug パラメータが指定されていません。";
          return;
        }

        // config読み込みをまず単独で実行（supabaseTable / tutorialMd の有無を確認するため）
        await loadScript(BASE + "quiz/config/" + slug + ".js");
        const cfg = window.QUIZ_CONFIG;
        if (!cfg) {
          document.getElementById("state-msg").textContent =
            "QUIZ_CONFIG が定義されていません: " + slug;
          return;
        }

        // supabaseTable があれば Supabase を、tutorialMd があれば marked を並列ロード
        const conditionalLoads = [];

        if (cfg.supabaseTable) {
          conditionalLoads.push(
            loadScript(
              "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2",
            ).then(() =>
              import("/js/supabase_config.js").then(({ db, tables }) => {
                window.db = db;
                window._db = db;
                window.SUPABASE_TABLES = tables;
              }),
            ),
          );
        }

        if (cfg.tutorialMd) {
          conditionalLoads.push(
            loadScript("https://cdn.jsdelivr.net/npm/marked/marked.min.js"),
          );
        }

        if (conditionalLoads.length > 0) {
          await Promise.all(conditionalLoads);
        }

        await loadScript(BASE + "quiz/logic.js");
        applyHeader(cfg);
        window.initQuizLogic(cfg);
      }

      boot().catch((err) => {
        document.getElementById("state-msg").textContent =
          "読み込みエラー: " + err.message;
        console.error(err);
      });
    </script>
  </body>
</html>

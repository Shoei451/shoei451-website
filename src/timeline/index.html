<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timeline | Shoei451</title>
    <link rel="icon" type="image/png" href="/images/favicon.ico" />
    <link rel="stylesheet" href="/css/utils.css" />
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="style.css" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#faba40" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Shoei451" />
    <link rel="apple-touch-icon" href="/images/favicon.png" />
  </head>
  <body>
    <!-- ===== Header ===== -->
    <header class="tl-header">
      <div class="tl-header__inner">
        <a class="tl-back-link" id="back-link" href="#">
          <i class="bi bi-chevron-left"></i>
          <span id="back-label">ホーム</span>
        </a>
        <span class="tl-header__title" id="header-title">年表</span>
        <div class="tl-header__controls">
          <input
            type="search"
            class="tl-search"
            id="search-input"
            placeholder="キーワード検索..."
            autocomplete="off"
          />
          <span class="logo-switches" id="theme-toggle-container"></span>
        </div>
      </div>

      <!-- カテゴリタブ -->
      <div class="tl-tabs-wrap" id="tabs-wrap"></div>

      <!-- 凡例 -->
      <div class="tl-legend" id="legend-wrap"></div>
    </header>

    <!-- ===== Stats bar ===== -->
    <div class="tl-meta-bar">
      <span class="tl-stat">全 <strong id="stat-total">-</strong> 件</span>
      <span class="tl-stat">表示中 <strong id="stat-shown">-</strong> 件</span>
    </div>

    <!-- ===== Main ===== -->
    <div class="tl-main">
      <div class="tl-state-msg" id="state-msg">Loading...</div>
      <div class="tl-app-root" id="tl-app-root" hidden></div>

      <!-- タイムラインレイアウト（JS が生成） -->
      <div class="tl-layout" id="tl-layout" style="display: none">
        <!-- [年代軸] -->
        <div class="tl-axis" id="tl-axis">
          <div class="tl-axis__line"></div>
        </div>
        <!-- [ラインカラム] -->
        <div class="tl-lines-col" id="tl-lines-col"></div>
        <!-- [出来事列] -->
        <div class="tl-events-col" id="tl-events-col"></div>
      </div>
    </div>

    <!-- ===== Detail Dialog ===== -->
    <dialog id="tl-detail-modal" class="tl-dialog">
      <div class="tl-dialog__header">
        <h5 id="tl-modal-label">詳細</h5>
        <button type="button" class="tl-dialog__close" aria-label="閉じる">
          ✕
        </button>
      </div>
      <div class="tl-dialog__body" id="tl-modal-body">
        <!-- JS が inject -->
      </div>
      <div class="tl-dialog__footer">
        <button type="button" class="tl-dialog__close">閉じる</button>
      </div>
    </dialog>

    <!-- ===== Admin App Template ===== -->
    <!--
      slug=wh_admin のときだけ app.js が cloneNode(true) して #tl-app-root に挿入する。
      通常のタイムライン表示には一切影響しない。
    -->
    <template id="admin-app-tpl">
      <section class="tl-admin-app__login" id="admin-login-screen">
        <div class="tl-admin-app__login-card">
          <div class="tl-admin-app__logo">WH</div>
          <h2 class="tl-admin-app__login-title">管理者ログイン</h2>
          <p class="tl-admin-app__login-subtitle">
            世界史年表のデータとメモを共通 shell 上で管理します。
          </p>
          <div
            class="tl-admin-app__login-error"
            id="admin-login-error"
            style="display: none"
          ></div>
          <label class="tl-admin-app__field">
            <span>メールアドレス</span>
            <input
              type="email"
              id="admin-login-email"
              placeholder="admin@example.com"
              autocomplete="email"
            />
          </label>
          <label class="tl-admin-app__field">
            <span>パスワード</span>
            <input
              type="password"
              id="admin-login-password"
              placeholder="••••••••"
              autocomplete="current-password"
            />
          </label>
          <button
            type="button"
            class="tl-admin-app__primary-btn"
            id="admin-login-btn"
          >
            ログイン
          </button>
        </div>
      </section>

      <section class="tl-admin-app__screen" id="admin-app-screen" hidden>
        <div class="tl-admin-app__toolbar">
          <div>
            <p class="tl-admin-app__eyebrow">World History Admin</p>
            <h2 class="tl-admin-app__title">wh_dates 管理</h2>
          </div>
          <div class="tl-admin-app__toolbar-actions">
            <button
              type="button"
              class="tl-admin-app__ghost-btn"
              id="admin-home-link"
            >
              年表へ戻る
            </button>
            <button
              type="button"
              class="tl-admin-app__ghost-btn"
              id="admin-logout-btn"
            >
              ログアウト
            </button>
          </div>
        </div>

        <section id="admin-data-view">
          <div class="container">
            <div class="stats" id="statsSection">
              <div class="stat-item">
                <div class="stat-number" id="totalEvents">-</div>
                <div class="stat-label">総件数</div>
              </div>
              <div class="stat-item">
                <div class="stat-number" id="displayedEvents">-</div>
                <div class="stat-label">表示中</div>
              </div>
            </div>

            <div class="controls">
              <input
                type="text"
                id="searchBox"
                class="search-box"
                placeholder="出来事を検索..."
              />
              <select id="regionFilter" class="filter-select">
                <option value="all">地域: すべて</option>
              </select>
              <select id="fieldFilter" class="filter-select">
                <option value="all">分野: すべて</option>
                <option value="政治">政治</option>
                <option value="経済">経済</option>
                <option value="文化・宗教">文化・宗教</option>
                <option value="社会">社会</option>
                <option value="外交・戦争">外交・戦争</option>
              </select>
              <button class="btn-add" id="addBtn">+ 新規追加</button>
            </div>

            <div class="tabs" id="recordTypeTabs">
              <button class="tab active" data-record-type="all">すべて</button>
              <button class="tab" data-record-type="event">出来事</button>
              <button class="tab" data-record-type="period">期間</button>
              <button class="tab" data-record-type="person">人物</button>
            </div>

            <div id="timelineContainer">
              <div class="loading">読み込み中...</div>
            </div>
          </div>

          <div class="modal" id="editModal">
            <div class="modal-content">
              <div class="modal-header">
                <h2 id="modalTitle">新規追加</h2>
                <button class="close-modal" id="closeModal" type="button">
                  ×
                </button>
              </div>
              <form id="editForm">
                <input type="hidden" id="editEventId" />
                <input type="hidden" id="editRecordType" value="event" />

                <div class="wizard-steps">
                  <div class="wizard-step active" data-step="1">
                    <div class="step-dot">1</div>
                    <div class="step-label">種別</div>
                  </div>
                  <div class="wizard-step" data-step="2">
                    <div class="step-dot">2</div>
                    <div class="step-label">内容</div>
                  </div>
                  <div class="wizard-step" data-step="3">
                    <div class="step-dot">3</div>
                    <div class="step-label">地域</div>
                  </div>
                  <div class="wizard-step" data-step="4">
                    <div class="step-dot">4</div>
                    <div class="step-label">確認</div>
                  </div>
                </div>

                <section id="step1" class="wizard-panel active">
                  <div class="form-group">
                    <label>登録するレコード種別</label>
                    <div class="record-type-grid">
                      <button
                        type="button"
                        class="record-type-btn"
                        data-rtype="event"
                      >
                        <span class="rtype-icon">●</span>
                        <span class="rtype-label">出来事</span>
                        <span class="rtype-desc">単一年の出来事を登録</span>
                      </button>
                      <button
                        type="button"
                        class="record-type-btn"
                        data-rtype="period"
                      >
                        <span class="rtype-icon">↔</span>
                        <span class="rtype-label">期間</span>
                        <span class="rtype-desc">開始年と終了年を登録</span>
                      </button>
                      <button
                        type="button"
                        class="record-type-btn"
                        data-rtype="person"
                      >
                        <span class="rtype-icon">◎</span>
                        <span class="rtype-label">人物</span>
                        <span class="rtype-desc">生没年つき人物を登録</span>
                      </button>
                    </div>
                  </div>
                </section>

                <section id="step2" class="wizard-panel">
                  <div id="s2-year-block">
                    <div class="form-row">
                      <div class="form-group">
                        <label for="editYear" id="s2-year-label">年</label>
                        <input
                          type="number"
                          id="editYear"
                          placeholder="例: 1789 / -221"
                        />
                        <small>紀元前は負の数。不明なら空白。</small>
                      </div>
                      <div
                        class="form-group"
                        id="s2-yearend-wrap"
                        style="display: none"
                      >
                        <label for="editYearEnd">終了年</label>
                        <input
                          type="number"
                          id="editYearEnd"
                          placeholder="例: 1918 / -206"
                        />
                        <small>不明なら空白。</small>
                      </div>
                    </div>
                  </div>

                  <div id="s2-person-block" style="display: none">
                    <div class="form-row">
                      <div class="form-group">
                        <label for="editYearBirth">生年</label>
                        <input
                          type="number"
                          id="editYearBirth"
                          placeholder="例: 1769 / -551"
                        />
                        <small>紀元前は負の数。不明なら空白。</small>
                      </div>
                      <div class="form-group">
                        <label for="editYearDeath">没年</label>
                        <input
                          type="number"
                          id="editYearDeath"
                          placeholder="例: 1821 / -479"
                        />
                        <small>不明なら空白。</small>
                      </div>
                    </div>
                  </div>

                  <div class="form-group">
                    <label for="editDateType">日付の形式</label>
                    <select id="editDateType">
                      <option value="year">年のみ</option>
                      <option value="full">完全な日付</option>
                      <option value="circa">頃（circa）</option>
                    </select>
                  </div>

                  <div
                    class="form-group"
                    id="s2-fulldate-wrap"
                    style="display: none"
                  >
                    <label for="editFullDate">日付</label>
                    <input type="date" id="editFullDate" />
                  </div>

                  <div class="form-group">
                    <label for="editEvent" id="s2-event-label">出来事</label>
                    <div class="event-wiki-row">
                      <input
                        type="text"
                        id="editEvent"
                        placeholder="例: フランス革命 / ナポレオン"
                      />
                      <button type="button" id="wikiSearchBtn">Wiki検索</button>
                    </div>
                    <small id="s2-event-hint"
                      >名詞形で短く。例: フランス革命</small
                    >
                    <div id="wikiResultPanel" style="display: none"></div>
                    <div id="dupePanel" class="dupe-panel hidden">
                      <div id="dupeBanner" class="dupe-banner warn-soft"></div>
                      <div id="dupeRecords" class="dupe-records"></div>
                    </div>
                  </div>

                  <div class="form-group">
                    <label for="editDescription">説明</label>
                    <textarea
                      id="editDescription"
                      placeholder="補足説明（フラッシュカード裏面）"
                    ></textarea>
                  </div>

                  <div class="form-group">
                    <label for="editField">分野</label>
                    <select id="editField">
                      <option value="">未設定</option>
                      <option value="政治">政治</option>
                      <option value="経済">経済</option>
                      <option value="文化・宗教">文化・宗教</option>
                      <option value="社会">社会</option>
                      <option value="外交・戦争">外交・戦争</option>
                    </select>
                  </div>

                  <div class="form-group">
                    <label for="editWikiUrl">Wikipedia URL</label>
                    <input
                      type="url"
                      id="editWikiUrl"
                      placeholder="https://ja.wikipedia.org/wiki/..."
                    />
                  </div>

                  <div class="form-group">
                    <label for="editMemo">メモ（Markdown）</label>
                    <textarea
                      id="editMemo"
                      placeholder="補足資料・関連リンクなど"
                    ></textarea>
                  </div>
                </section>

                <section id="step3" class="wizard-panel">
                  <div class="form-group">
                    <label>地域</label>
                    <div id="regionToggles" class="region-toggle-grid"></div>
                  </div>
                </section>

                <section id="step4" class="wizard-panel">
                  <div class="form-group">
                    <label>登録内容の確認</label>
                    <table class="confirm-table">
                      <tbody id="confirmTable"></tbody>
                    </table>
                  </div>
                </section>

                <div class="wizard-footer">
                  <button type="button" class="btn-cancel" id="cancelBtn">
                    キャンセル
                  </button>
                  <button
                    type="button"
                    class="btn-back"
                    id="wizardBack"
                    style="display: none"
                  >
                    戻る
                  </button>
                  <button type="button" class="btn-next" id="wizardNext">
                    次へ
                  </button>
                  <button
                    type="button"
                    class="btn-save"
                    id="wizardSave"
                    style="display: none"
                  >
                    保存
                  </button>
                </div>
              </form>
            </div>
          </div>
        </section>

        <section id="admin-memo-view" hidden>
          <div class="memo-page-wrap">
            <div class="stats">
              <div class="stat-item">
                <div class="stat-number" id="memoStatTotal">-</div>
                <div class="stat-label">総件数</div>
              </div>
              <div class="stat-item">
                <div class="stat-number" id="memoStatMemo">-</div>
                <div class="stat-label">メモあり</div>
              </div>
              <div class="stat-item">
                <div class="stat-number" id="memoStatFiltered">-</div>
                <div class="stat-label">表示中</div>
              </div>
            </div>

            <div class="memo-toolbar">
              <input
                type="search"
                id="memoSearchInput"
                class="search-box"
                style="flex: 1; width: auto"
                placeholder="出来事・地域・分野で検索..."
                autocomplete="off"
              />
              <button class="filter-toggle" id="memoFilterBtn">メモあり</button>
              <select id="memoFieldFilter" class="filter-select">
                <option value="">分野: すべて</option>
                <option value="政治">政治</option>
                <option value="経済">経済</option>
                <option value="文化・宗教">文化・宗教</option>
                <option value="社会">社会</option>
                <option value="外交・戦争">外交・戦争</option>
              </select>
            </div>

            <div id="memoRecordList">
              <div class="loading">読み込み中...</div>
            </div>
          </div>

          <div class="sheet-backdrop" id="memoSheetBackdrop"></div>
          <div class="sheet" id="memoSheet">
            <div class="sheet-drag-bar"><span></span></div>
            <div class="sheet-info">
              <div class="sheet-info-year" id="memoSheetYear"></div>
              <div class="sheet-info-event" id="memoSheetEvent"></div>
              <div class="sheet-info-tags" id="memoSheetTags"></div>
            </div>

            <div class="editor-tabs">
              <button class="editor-tab active" id="memoTabEdit" type="button">
                編集
              </button>
              <button class="editor-tab" id="memoTabPreview" type="button">
                Preview
              </button>
            </div>

            <div class="editor-body">
              <textarea
                class="memo-textarea"
                id="memoTextarea"
                placeholder="Markdownでメモを書けます"
              ></textarea>
              <div
                class="md-preview"
                id="memoMdPreview"
                style="display: none"
              ></div>
            </div>

            <div class="sheet-footer">
              <button
                class="btn-clear"
                id="memoClearBtn"
                type="button"
                style="display: none"
              >
                削除
              </button>
              <button class="btn-cancel" id="memoCancelBtn" type="button">
                キャンセル
              </button>
              <button class="btn-save" id="memoSaveBtn" type="button">
                保存
              </button>
            </div>
          </div>

          <div class="toast" id="memoToast"></div>
        </section>
      </section>
    </template>

    <!-- ===== Scripts ===== -->
    <script src="/js/icons.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="/js/theme-toggle.js"></script>
    <script type="module" src="script.js"></script>

    <!-- フラッシュ防止 -->
    <script>
      (function () {
        const p = localStorage.getItem("pref-theme");
        if (
          p === "dark" ||
          (!p && window.matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
          document.body.classList.add("dark");
        }
      })();
    </script>
  </body>
</html>

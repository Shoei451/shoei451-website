<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timeline | Shoei451</title>
    <link rel="icon" type="image/png" href="/images/favicon.ico" />
    <link rel="stylesheet" href="/css/utils.css" />
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="style.css" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#faba40" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Shoei451" />
    <link rel="apple-touch-icon" href="/images/favicon.png" />
  </head>
  <body>
    <!-- ===== Header ===== -->
    <header class="tl-header">
      <div class="tl-header__inner">
        <a class="tl-back-link" id="back-link" href="#">
          <i class="bi bi-chevron-left"></i>
          <span id="back-label">ホーム</span>
        </a>
        <span class="tl-header__title" id="header-title">年表</span>
        <div class="tl-header__controls">
          <input
            type="search"
            class="tl-search"
            id="search-input"
            placeholder="キーワード検索..."
            autocomplete="off"
          />
          <span class="logo-switches" id="theme-toggle-container"></span>
        </div>
      </div>

      <!-- カテゴリタブ -->
      <div class="tl-tabs-wrap" id="tabs-wrap"></div>

      <!-- 凡例 -->
      <div class="tl-legend" id="legend-wrap"></div>
    </header>

    <!-- ===== Stats bar ===== -->
    <div class="tl-meta-bar">
      <span class="tl-stat">全 <strong id="stat-total">-</strong> 件</span>
      <span class="tl-stat">表示中 <strong id="stat-shown">-</strong> 件</span>
    </div>

    <!-- ===== Main ===== -->
    <div class="tl-main">
      <div class="tl-state-msg" id="state-msg">Loading...</div>
      <div class="tl-app-root" id="tl-app-root" hidden></div>

      <!-- タイムラインレイアウト（JS が生成） -->
      <div class="tl-layout" id="tl-layout" style="display: none">
        <!-- [年代軸] -->
        <div class="tl-axis" id="tl-axis">
          <div class="tl-axis__line"></div>
        </div>
        <!-- [ラインカラム] -->
        <div class="tl-lines-col" id="tl-lines-col"></div>
        <!-- [出来事列] -->
        <div class="tl-events-col" id="tl-events-col"></div>
      </div>
    </div>

    <!-- ===== Detail Dialog ===== -->
    <dialog id="tl-detail-modal" class="tl-dialog">
      <div class="tl-dialog__header">
        <h5 id="tl-modal-label">詳細</h5>
        <button type="button" class="tl-dialog__close" aria-label="閉じる">
          ✕
        </button>
      </div>
      <div class="tl-dialog__body" id="tl-modal-body">
        <!-- JS が inject -->
      </div>
      <div class="tl-dialog__footer">
        <button type="button" class="tl-dialog__close">閉じる</button>
      </div>
    </dialog>

    <!-- ===== Scripts ===== -->
    <script src="../js/icons.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="../js/theme-toggle.js"></script>
    <script type="module" src="script.js"></script>

    <!-- フラッシュ防止 -->
    <script>
      (function () {
        const p = localStorage.getItem("pref-theme");
        if (
          p === "dark" ||
          (!p && window.matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
          document.body.classList.add("dark");
        }
      })();
    </script>
  </body>
</html>


<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>English Flashcards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <style>
    /* ── 451-docs デザインシステム ── */
    :root {
      --bg:      #ffffff; --surface: #f9fafb;
      --text:    #222;    --sub:     #6b7280;
      --border:  #e5e7eb; --accent:  #3b82f6;
      --shadow:  rgba(0,0,0,0.1);
      --green:   #22c55e; --red: #ef4444;
    }
    body.dark {
      --bg: #0f172a; --surface: #1e293b;
      --text: #f1f5f9; --sub: #94a3b8;
      --border: #334155; --accent: #60a5fa;
      --shadow: rgba(0,0,0,0.5);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 24px 20px 60px;
    }

    /* ── Header ── */
    header {
      width: 100%; max-width: 560px;
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 32px;
    }
    .logo {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 1.3rem; color: var(--text);
    }
    .logo em { font-style: italic; color: var(--accent); }

    #theme-toggle {
      background: var(--surface); border: 2px solid var(--accent);
      border-radius: 50%; padding: 8px; cursor: pointer;
      box-shadow: 0 4px 12px var(--shadow);
      display: flex; align-items: center; justify-content: center;
    }
    #moon, #sun { display: none; width: 18px; height: 18px; stroke: var(--accent); }
    body.dark #sun { display: block; }
    body:not(.dark) #moon { display: block; }

    /* ── Progress ── */
    .progress-wrap { width: 100%; max-width: 560px; margin-bottom: 16px; }
    .progress-meta {
      display: flex; justify-content: space-between;
      font-size: 0.8rem; color: var(--sub); margin-bottom: 6px;
    }
    .progress-bar {
      height: 4px; background: var(--border); border-radius: 2px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: var(--accent);
      border-radius: 2px; transition: width 0.4s ease;
    }

    /* ── Card scene ── */
    .card-scene {
      perspective: 1200px;
      width: 100%; max-width: 560px; height: 280px;
      margin-bottom: 24px; cursor: pointer;
    }
    .card-el {
      width: 100%; height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.45s cubic-bezier(.4,0,.2,1);
      position: relative;
    }
    .card-el.flipped { transform: rotateY(180deg); }

    .card-face {
      position: absolute; inset: 0;
      backface-visibility: hidden;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      border-radius: 20px; padding: 32px;
      border: 1.5px solid var(--border);
      box-shadow: 0 8px 32px var(--shadow);
      user-select: none;
    }
    .card-front {
      background: var(--surface);
      gap: 12px;
    }
    .card-back {
      background: var(--accent); color: #fff;
      transform: rotateY(180deg);
      gap: 16px;
    }

    .card-label {
      font-size: 0.7rem; font-weight: 600; letter-spacing: 0.12em;
      text-transform: uppercase; opacity: 0.6;
    }
    .card-word {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: clamp(2rem, 6vw, 2.8rem);
      font-weight: 400; text-align: center; line-height: 1.2;
    }
    .card-pos {
      font-size: 0.8rem; opacity: 0.65;
      border: 1px solid currentColor; border-radius: 20px;
      padding: 2px 10px;
    }
    .card-hint {
      font-size: 0.85rem; opacity: 0.7;
      text-align: center; line-height: 1.6;
    }
    .card-meaning {
      font-size: 1.3rem; font-weight: 500;
      text-align: center; line-height: 1.4;
    }
    .card-example {
      font-size: 0.85rem; opacity: 0.85;
      text-align: center; line-height: 1.6;
      font-style: italic;
      border-top: 1px solid rgba(255,255,255,0.25);
      padding-top: 12px; width: 100%;
    }

    .flip-hint {
      font-size: 0.75rem; color: var(--sub);
      text-align: center; margin-bottom: 20px;
    }
    .flip-hint kbd {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 4px; padding: 1px 6px; font-size: 0.72rem;
      font-family: inherit;
    }

    /* ── Action buttons ── */
    .actions {
      display: flex; gap: 12px; width: 100%; max-width: 560px;
      margin-bottom: 32px;
    }
    .btn {
      flex: 1; padding: 13px 0; border-radius: 12px;
      font-family: inherit; font-size: 0.9rem; font-weight: 600;
      border: 2px solid; cursor: pointer; transition: all 0.2s ease;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-skip {
      background: transparent; border-color: var(--border); color: var(--sub);
    }
    .btn-skip:hover { border-color: var(--sub); color: var(--text); }
    .btn-known {
      background: var(--green); border-color: var(--green); color: #fff;
    }
    .btn-known:hover { opacity: 0.85; transform: translateY(-1px); }

    /* ── Done screen ── */
    .done-screen {
      display: none; flex-direction: column; align-items: center;
      width: 100%; max-width: 560px; text-align: center; gap: 16px;
    }
    .done-screen.show { display: flex; }
    .main-content.hidden { display: none; }

    .done-icon { font-size: 3.5rem; margin-bottom: 8px; }
    .done-title {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 2rem;
    }
    .done-title em { font-style: italic; color: var(--accent); }
    .done-score {
      font-size: 3rem; font-weight: 700; color: var(--accent);
      line-height: 1;
    }
    .done-score span { font-size: 1rem; color: var(--sub); font-weight: 400; }
    .done-msg { color: var(--sub); font-size: 0.95rem; line-height: 1.7; }

    .done-breakdown {
      display: flex; gap: 16px; width: 100%;
    }
    .breakdown-item {
      flex: 1; padding: 16px; border-radius: 12px;
      background: var(--surface); border: 1px solid var(--border);
    }
    .breakdown-num { font-size: 1.5rem; font-weight: 700; margin-bottom: 2px; }
    .breakdown-label { font-size: 0.8rem; color: var(--sub); }
    .breakdown-item.known .breakdown-num { color: var(--green); }
    .breakdown-item.skipped .breakdown-num { color: var(--sub); }

    .btn-restart {
      padding: 12px 32px; border-radius: 999px;
      background: var(--accent); border: none; color: #fff;
      font-family: inherit; font-size: 0.95rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
      margin-top: 8px;
    }
    .btn-restart:hover { opacity: 0.85; transform: translateY(-1px); }

    /* ── Word list ── */
    .wordlist-wrap {
      width: 100%; max-width: 560px; margin-top: 12px;
    }
    .wordlist-toggle {
      background: none; border: none; color: var(--sub);
      font-family: inherit; font-size: 0.82rem; cursor: pointer;
      padding: 4px 0; display: flex; align-items: center; gap: 6px;
    }
    .wordlist-toggle svg { width: 14px; height: 14px; stroke: currentColor;
      transition: transform 0.2s; }
    .wordlist-toggle.open svg { transform: rotate(90deg); }
    .wordlist { display: none; margin-top: 12px; flex-direction: column; gap: 8px; }
    .wordlist.show { display: flex; }
    .wl-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 16px; border-radius: 10px;
      background: var(--surface); border: 1px solid var(--border);
      font-size: 0.88rem;
    }
    .wl-item.known { border-left: 3px solid var(--green); }
    .wl-item.skipped { opacity: 0.5; }
    .wl-word { font-weight: 600; }
    .wl-meaning { color: var(--sub); }
    .wl-status { font-size: 0.75rem; }
    .wl-status.known { color: var(--green); }
    .wl-status.skipped { color: var(--sub); }

    @media (max-width: 480px) {
      .card-scene { height: 240px; }
      .card-word { font-size: 1.8rem; }
      .done-breakdown { flex-direction: column; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Flash<em>Cards.</em></div>
  <button id="theme-toggle" aria-label="Toggle Theme">
    <svg id="moon" viewBox="0 0 24 24" fill="none" stroke-width="2">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
    <svg id="sun" viewBox="0 0 24 24" fill="none" stroke-width="2">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/>
      <line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/>
      <line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
  </button>
</header>

<!-- メイン -->
<div class="main-content" id="mainContent">

  <div class="progress-wrap">
    <div class="progress-meta">
      <span id="progress-text">1 / 10</span>
      <span id="known-count">✓ 0 known</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <div class="card-scene" id="cardScene" role="button" aria-label="カードをめくる" tabindex="0">
    <div class="card-el" id="cardEl">
      <div class="card-face card-front">
        <span class="card-label">English</span>
        <div class="card-word" id="frontWord"></div>
        <div class="card-pos" id="frontPos"></div>
        <div class="card-hint" id="frontHint"></div>
      </div>
      <div class="card-face card-back">
        <span class="card-label" style="color:rgba(255,255,255,0.6)">意味</span>
        <div class="card-meaning" id="backMeaning"></div>
        <div class="card-example" id="backExample"></div>
      </div>
    </div>
  </div>

  <p class="flip-hint">
    クリックまたは <kbd>Space</kbd> でめくる ·
    <kbd>→</kbd> 次へ · <kbd>K</kbd> 覚えた
  </p>

  <div class="actions">
    <button class="btn btn-skip" id="btnSkip">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           width="16" height="16" style="flex-shrink:0">
        <polyline points="9 18 15 12 9 6"></polyline>
      </svg>
      もう一度
    </button>
    <button class="btn btn-known" id="btnKnown">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           width="16" height="16" style="flex-shrink:0">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
      覚えた！
    </button>
  </div>

</div>

<!-- 完了画面 -->
<div class="done-screen" id="doneScreen">
  <div class="done-icon" id="doneIcon"></div>
  <h1 class="done-title">Good <em>work!</em></h1>
  <div class="done-score" id="doneScore"></div>
  <p class="done-msg" id="doneMsg"></p>

  <div class="done-breakdown">
    <div class="breakdown-item known">
      <div class="breakdown-num" id="breakKnown">0</div>
      <div class="breakdown-label">覚えた</div>
    </div>
    <div class="breakdown-item skipped">
      <div class="breakdown-num" id="breakSkipped">0</div>
      <div class="breakdown-label">もう一度</div>
    </div>
  </div>

  <button class="btn-restart" id="btnRestart">もう一周する</button>

  <div class="wordlist-wrap">
    <button class="wordlist-toggle" id="wlToggle">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
        <polyline points="9 18 15 12 9 6"></polyline>
      </svg>
      単語リストを見る
    </button>
    <div class="wordlist" id="wordlist"></div>
  </div>
</div>

<script>
// ── 単語データ ──────────────────────────────────────────────
// { word, pos, hint, meaning, example }
// pos: n.名詞 v.動詞 adj.形容詞 adv.副詞
const CARDS = [
  {
    word: 'ambiguous',
    pos: 'adj.',
    hint: 'あいまい・多義的な',
    meaning: '曖昧な、多義的な',
    example: 'The instructions were ambiguous, so I wasn\'t sure what to do.',
  },
  {
    word: 'concise',
    pos: 'adj.',
    hint: '短くわかりやすい',
    meaning: '簡潔な、手短な',
    example: 'Please write a concise summary of the article.',
  },
  {
    word: 'advocate',
    pos: 'v. / n.',
    hint: '支持する・支持者',
    meaning: '主張する、擁護する / 支持者',
    example: 'She advocates for equal rights in education.',
  },
  {
    word: 'inevitable',
    pos: 'adj.',
    hint: '避けられない',
    meaning: '避けられない、必然的な',
    example: 'Change is inevitable in a growing society.',
  },
  {
    word: 'contemplate',
    pos: 'v.',
    hint: 'じっくり考える',
    meaning: '熟考する、検討する',
    example: 'I need time to contemplate my decision.',
  },
  {
    word: 'resilient',
    pos: 'adj.',
    hint: '立ち直りが早い',
    meaning: '回復力のある、柔軟な',
    example: 'Young people are often more resilient than we expect.',
  },
  {
    word: 'phenomenon',
    pos: 'n.',
    hint: '自然・社会現象',
    meaning: '現象、事象',
    example: 'Climate change is a global phenomenon.',
  },
  {
    word: 'coherent',
    pos: 'adj.',
    hint: '一貫性のある',
    meaning: '一貫した、筋の通った',
    example: 'Your essay needs a more coherent structure.',
  },
  {
    word: 'pragmatic',
    pos: 'adj.',
    hint: '現実的な',
    meaning: '実用的な、実際的な',
    example: 'A pragmatic approach often works better than an idealistic one.',
  },
  {
    word: 'scrutinize',
    pos: 'v.',
    hint: '細かく調べる',
    meaning: '精査する、じっくり検討する',
    example: 'The committee will scrutinize the proposal carefully.',
  },
];

// ── 状態 ────────────────────────────────────────────────────
const state = {
  deck: [],
  current: 0,
  known: [],
  skipped: [],
  flipped: false,
};

// ── 初期化 ──────────────────────────────────────────────────
function init() {
  state.deck = shuffle([...CARDS]);
  state.current = 0;
  state.known = [];
  state.skipped = [];
  state.flipped = false;

  document.getElementById('mainContent').classList.remove('hidden');
  document.getElementById('doneScreen').classList.remove('show');
  document.getElementById('cardEl').classList.remove('flipped');

  render();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ── レンダリング ─────────────────────────────────────────────
function render() {
  const card = state.deck[state.current];
  const total = state.deck.length;

  // カード内容
  document.getElementById('frontWord').textContent    = card.word;
  document.getElementById('frontPos').textContent     = card.pos;
  document.getElementById('frontHint').textContent    = card.hint;
  document.getElementById('backMeaning').textContent  = card.meaning;
  document.getElementById('backExample').textContent  = `"${card.example}"`;

  // 進捗
  const done = state.current;
  document.getElementById('progress-text').textContent = `${done + 1} / ${total}`;
  document.getElementById('known-count').textContent   = `✓ ${state.known.length} known`;
  document.getElementById('progressFill').style.width  = `${(done / total) * 100}%`;

  // めくり状態リセット
  state.flipped = false;
  document.getElementById('cardEl').classList.remove('flipped');
}

// ── カードをめくる ───────────────────────────────────────────
function flip() {
  state.flipped = !state.flipped;
  document.getElementById('cardEl').classList.toggle('flipped', state.flipped);
}

// ── 次のカードへ ─────────────────────────────────────────────
function advance(isKnown) {
  const card = state.deck[state.current];
  if (isKnown) state.known.push(card);
  else         state.skipped.push(card);

  state.current++;
  if (state.current >= state.deck.length) {
    showDone();
  } else {
    render();
  }
}

// ── 完了画面 ─────────────────────────────────────────────────
function showDone() {
  const total  = state.deck.length;
  const known  = state.known.length;
  const pct    = Math.round((known / total) * 100);

  const icon = pct >= 80 ? '🎉' : pct >= 60 ? '😊' : '📚';
  const msg  = pct >= 80 ? 'Great job! You know most of these words.'
             : pct >= 60 ? 'Good progress! Keep reviewing the ones you missed.'
             : 'Keep going! Repetition is the key to vocabulary building.';

  document.getElementById('doneIcon').textContent    = icon;
  document.getElementById('doneScore').innerHTML     = `${pct}<span>%</span>`;
  document.getElementById('doneMsg').textContent     = msg;
  document.getElementById('breakKnown').textContent  = known;
  document.getElementById('breakSkipped').textContent = state.skipped.length;

  // 単語リスト生成
  const list = document.getElementById('wordlist');
  list.innerHTML = '';
  state.deck.forEach(card => {
    const isKnown = state.known.includes(card);
    const li = document.createElement('div');
    li.className = `wl-item ${isKnown ? 'known' : 'skipped'}`;
    li.innerHTML = `
      <span class="wl-word">${card.word}</span>
      <span class="wl-meaning">${card.meaning.split('、')[0]}</span>
      <span class="wl-status ${isKnown ? 'known' : 'skipped'}">${isKnown ? '✓' : '×'}</span>
    `;
    list.appendChild(li);
  });

  document.getElementById('mainContent').classList.add('hidden');
  document.getElementById('doneScreen').classList.add('show');
}

// ── イベント ─────────────────────────────────────────────────
document.getElementById('cardScene').addEventListener('click', flip);
document.getElementById('btnSkip').addEventListener('click', () => {
  if (!state.flipped) flip();
  setTimeout(() => advance(false), state.flipped ? 0 : 320);
});
document.getElementById('btnKnown').addEventListener('click', () => {
  if (!state.flipped) flip();
  setTimeout(() => advance(true), state.flipped ? 0 : 320);
});
document.getElementById('btnRestart').addEventListener('click', init);

// キーボード
document.addEventListener('keydown', e => {
  if (document.getElementById('doneScreen').classList.contains('show')) return;
  switch (e.key) {
    case ' ':
    case 'Enter': e.preventDefault(); flip(); break;
    case 'ArrowRight':
    case 'n': advance(false); break;
    case 'k':
    case 'ArrowUp': advance(true); break;
  }
});

// 単語リスト開閉
const wlToggle = document.getElementById('wlToggle');
const wordlist = document.getElementById('wordlist');
wlToggle.addEventListener('click', () => {
  const open = wordlist.classList.toggle('show');
  wlToggle.classList.toggle('open', open);
  wlToggle.querySelector('span') &&
    (wlToggle.querySelector('span').textContent = open ? '単語リストを閉じる' : '単語リストを見る');
});

// ── テーマトグル（theme-toggle.js と同じロジック）──────────────
const themeToggle = document.getElementById('theme-toggle');
function setTheme(isDark) {
  document.body.classList.toggle('dark', isDark);
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
}
const savedTheme = localStorage.getItem('theme');
if (savedTheme) setTheme(savedTheme === 'dark');
else if (window.matchMedia('(prefers-color-scheme: dark)').matches) setTheme(true);
themeToggle.addEventListener('click', () => setTheme(!document.body.classList.contains('dark')));

// ── スタート ─────────────────────────────────────────────────
init();
</script>

</body>
</html>

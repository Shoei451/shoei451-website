<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>年表</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="css/theme-toggle.css" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --color-bg: #fafaf8;
        --color-surface: #ffffff;
        --color-border: #e8e8e5;
        --color-text-primary: #1a1a1a;
        --color-text-secondary: #555555;
        --color-accent: #1a2b3c;
        --color-accent-light: rgba(26, 43, 60, 0.08);
        --color-accent-rgb: 26, 43, 60;
        --font-sans: "Noto Sans JP", "Hiragino Kaku Gothic ProN", sans-serif;
        --font-display: "Zen Kaku Gothic New", "Noto Sans JP", sans-serif;
        --space-xs: 0.5rem;
        --space-sm: 1rem;
        --space-md: 1.5rem;
        --space-lg: 2.5rem;
        --radius-sm: 6px;
        --radius-md: 12px;
        --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
      }

      body.dark {
        --color-bg: #0f172a;
        --color-surface: #1e293b;
        --color-text-primary: #f1f5f9;
        --color-text-secondary: #94a3b8;
        --color-border: #334155;
        --color-accent-light: rgba(var(--color-accent-rgb), 0.15);
      }

      body {
        font-family: var(--font-sans);
        font-size: 1.05rem;
        line-height: 1.8;
        color: var(--color-text-primary);
        background: var(--color-bg);
        -webkit-font-smoothing: antialiased;
        transition:
          background 0.3s,
          color 0.3s;
      }

      /* ===== Header ===== */
      .site-header {
        background: var(--color-surface);
        border-bottom: 2px solid var(--color-accent);
        padding: 0 var(--space-md);
        height: 56px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 100;
        box-shadow: var(--shadow-sm);
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: var(--space-sm);
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        color: var(--color-text-secondary);
        text-decoration: none;
        font-size: 0.875rem;
        padding: 6px 10px;
        border-radius: var(--radius-sm);
        transition:
          color 0.15s,
          background 0.15s;
      }

      .back-link:hover {
        color: var(--color-accent);
        background: var(--color-accent-light);
      }

      .header-title {
        font-family: var(--font-display);
        font-size: 1.1rem;
        font-weight: 700;
        color: var(--color-accent);
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: var(--space-sm);
      }

      /* ===== Controls ===== */
      .controls {
        display: flex;
        gap: var(--space-sm);
        align-items: center;
        flex-wrap: wrap;
        padding: var(--space-md);
        max-width: 1200px;
        margin: 0 auto;
      }

      .search-input {
        flex: 1;
        min-width: 200px;
        padding: 10px 14px;
        border: 1.5px solid var(--color-border);
        border-radius: var(--radius-sm);
        background: var(--color-surface);
        color: var(--color-text-primary);
        font-family: var(--font-sans);
        font-size: 0.95rem;
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
      }

      .search-input:focus {
        outline: none;
        border-color: var(--color-accent);
        box-shadow: 0 0 0 3px var(--color-accent-light);
      }

      .search-input::placeholder {
        color: var(--color-text-secondary);
      }

      /* ===== Stats ===== */
      .stats-bar {
        display: flex;
        align-items: center;
        gap: var(--space-md);
        padding: 0 var(--space-md) var(--space-sm);
        max-width: 1200px;
        margin: 0 auto;
        font-size: 0.875rem;
        color: var(--color-text-secondary);
      }

      .stat-item strong {
        color: var(--color-accent);
        font-weight: 700;
      }

      /* ===== Tabs ===== */
      .tabs-wrap {
        padding: 0 var(--space-md);
        max-width: 1200px;
        margin: 0 auto;
        border-bottom: 1.5px solid var(--color-border);
        display: flex;
        gap: 0;
        overflow-x: auto;
        scrollbar-width: none;
      }

      .tabs-wrap::-webkit-scrollbar {
        display: none;
      }

      .tab-btn {
        padding: 10px 18px;
        border: none;
        background: transparent;
        color: var(--color-text-secondary);
        font-family: var(--font-sans);
        font-size: 0.9rem;
        font-weight: 500;
        cursor: pointer;
        border-bottom: 2.5px solid transparent;
        margin-bottom: -1.5px;
        white-space: nowrap;
        transition:
          color 0.15s,
          border-color 0.15s;
      }

      .tab-btn:hover {
        color: var(--color-text-primary);
      }

      .tab-btn.is-active {
        color: var(--color-accent);
        border-bottom-color: var(--color-accent);
        font-weight: 700;
      }

      /* ===== Table ===== */
      .table-wrap {
        padding: var(--space-md);
        max-width: 1200px;
        margin: 0 auto;
        overflow-x: auto;
      }

      .timeline-table {
        width: 100%;
        border-collapse: collapse;
        background: var(--color-surface);
        border-radius: var(--radius-md);
        overflow: hidden;
        box-shadow: var(--shadow-md);
      }

      .timeline-table thead {
        background: var(--color-accent);
        color: #fff;
      }

      .timeline-table th {
        padding: 13px 16px;
        text-align: left;
        font-weight: 600;
        font-size: 0.875rem;
        letter-spacing: 0.03em;
      }

      .timeline-table td {
        padding: 12px 16px;
        border-bottom: 1px solid var(--color-border);
        vertical-align: top;
      }

      .timeline-table tbody tr:last-child td {
        border-bottom: none;
      }

      .timeline-table tbody tr {
        transition: background 0.15s;
      }

      .timeline-table tbody tr:hover {
        background: var(--color-accent-light);
      }

      .cell-year {
        font-weight: 700;
        color: var(--color-accent);
        white-space: nowrap;
        font-size: 0.95rem;
      }

      .cell-event {
        font-weight: 500;
      }

      .cell-desc {
        color: var(--color-text-secondary);
        font-size: 0.9rem;
      }

      .wiki-link {
        color: var(--color-accent);
        text-decoration: none;
        font-size: 0.85rem;
        opacity: 0.8;
        transition: opacity 0.15s;
      }

      .wiki-link:hover {
        opacity: 1;
        text-decoration: underline;
      }

      /* ===== Category chip ===== */
      .cat-chip {
        display: inline-block;
        padding: 2px 10px;
        border-radius: 100px;
        font-size: 0.78rem;
        font-weight: 600;
        white-space: nowrap;
        /* 色は JS で style 属性から注入 */
      }

      /* ===== Empty / Loading ===== */
      .state-msg {
        text-align: center;
        padding: var(--space-lg) var(--space-md);
        color: var(--color-text-secondary);
        font-size: 0.95rem;
      }

      /* ===== Responsive ===== */
      @media (max-width: 768px) {
        .site-header {
          padding: 0 var(--space-sm);
        }

        .header-title {
          font-size: 0.95rem;
        }

        .controls {
          padding: var(--space-sm);
        }

        .stats-bar {
          padding: 0 var(--space-sm) var(--space-xs);
          flex-wrap: wrap;
          gap: var(--space-sm);
        }

        .tabs-wrap {
          padding: 0 var(--space-sm);
        }

        .table-wrap {
          padding: var(--space-sm);
        }

        .timeline-table {
          font-size: 0.9rem;
        }

        .timeline-table th,
        .timeline-table td {
          padding: 10px 12px;
        }

        /* モバイルでは説明列を非表示 */
        .col-desc {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="header-left">
        <a class="back-link" id="back-link" href="#">
          <i class="bi bi-chevron-left"></i>
          <span id="back-label">ホーム</span>
        </a>
        <span class="header-title" id="header-title">年表</span>
      </div>
      <div class="header-right">
        <span class="logo-switches" id="theme-toggle-container"></span>
      </div>
    </header>

    <div class="controls">
      <input
        type="search"
        class="search-input"
        id="search-input"
        placeholder="キーワードで絞り込む..."
        autocomplete="off"
      />
    </div>

    <div class="stats-bar">
      <span class="stat-item">全 <strong id="stat-total">-</strong> 件</span>
      <span class="stat-item"
        >表示中 <strong id="stat-shown">-</strong> 件</span
      >
    </div>

    <div class="tabs-wrap" id="tabs-wrap"></div>

    <div class="table-wrap">
      <div class="state-msg" id="state-msg">読み込み中...</div>
      <table class="timeline-table" id="timeline-table" style="display: none">
        <thead>
          <tr id="table-head"></tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/theme-toggle.js"></script>
    <script>
      // ── Supabase クライアント（timeline.html 専用）────────────────
      // supabase_config.js は ESモジュールのため直接 import 不可。
      // CDN グローバルから直接生成して window._db に置き、
      // timeline-config.js から参照できるようにする。
      (function () {
        const SUPABASE_URL = "https://gjuqsyaugrsshmjerhme.supabase.co";
        const SUPABASE_KEY = "sb_publishable_K-TVhPlOAGY7cLhanI9Tag_kKIDoIGU";
        window._db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      })();

      // ── slug からコンフィグをロード ──────────────────────────────
      const slug = new URLSearchParams(location.search).get("slug");
      if (!slug) {
        document.getElementById("state-msg").textContent =
          "slug パラメータが指定されていません（例: ?slug=history/china）";
      } else {
        const script = document.createElement("script");
        script.src = slug + "/timeline-config.js";
        script.onerror = () => {
          document.getElementById("state-msg").textContent =
            slug + "/timeline-config.js が見つかりません。";
        };
        script.onload = () => initTimeline(window.TIMELINE_CONFIG);
        document.head.appendChild(script);
      }

      // ── メインロジック ─────────────────────────────────────────
      async function initTimeline(cfg) {
        if (!cfg) {
          document.getElementById("state-msg").textContent =
            "TIMELINE_CONFIG が定義されていません。";
          return;
        }

        // ページ情報を適用
        document.title = cfg.title + " — Shoei451";
        document.getElementById("header-title").textContent = cfg.title;
        document.getElementById("back-link").href =
          cfg.backLink || "index.html";
        document.getElementById("back-label").textContent =
          cfg.backLabel || "ホーム";

        // アクセントカラーを適用
        if (cfg.accentColor) {
          document.documentElement.style.setProperty(
            "--color-accent",
            cfg.accentColor,
          );
        }
        if (cfg.accentColorRgb) {
          document.documentElement.style.setProperty(
            "--color-accent-rgb",
            cfg.accentColorRgb,
          );
        }

        // テーブルヘッダ
        const head = document.getElementById("table-head");
        head.innerHTML = `
          <th style="width:110px;">年代</th>
          <th>出来事</th>
          <th style="width:120px;">カテゴリ</th>
          <th class="col-desc">説明</th>
          ${cfg.showWikiLink ? '<th style="width:60px;">Wiki</th>' : ""}
        `;

        // データ取得
        let data = [];
        try {
          data = await cfg.fetchData();
        } catch (e) {
          document.getElementById("state-msg").textContent =
            "データの読み込みに失敗しました: " + e.message;
          return;
        }

        // タブ生成
        buildTabs(cfg, data);

        // 初期レンダリング
        renderTable(cfg, data, "all", "");

        // 検索
        document
          .getElementById("search-input")
          .addEventListener("input", (e) => {
            const activeTab = document.querySelector(".tab-btn.is-active");
            renderTable(
              cfg,
              data,
              activeTab?.dataset.cat || "all",
              e.target.value,
            );
          });
      }

      function buildTabs(cfg, data) {
        const wrap = document.getElementById("tabs-wrap");
        const cats = cfg.categories || [];

        const allBtn = document.createElement("button");
        allBtn.className = "tab-btn is-active";
        allBtn.dataset.cat = "all";
        allBtn.textContent = "すべて";
        allBtn.addEventListener("click", () => switchTab("all", cfg, data));
        wrap.appendChild(allBtn);

        cats.forEach((cat) => {
          const btn = document.createElement("button");
          btn.className = "tab-btn";
          btn.dataset.cat = cat.id;
          btn.textContent = cat.label;
          btn.addEventListener("click", () => switchTab(cat.id, cfg, data));
          wrap.appendChild(btn);
        });
      }

      function switchTab(catId, cfg, data) {
        document
          .querySelectorAll(".tab-btn")
          .forEach((b) =>
            b.classList.toggle("is-active", b.dataset.cat === catId),
          );
        const searchVal = document.getElementById("search-input").value;
        renderTable(cfg, data, catId, searchVal);
      }

      function renderTable(cfg, data, catId, searchVal) {
        const q = searchVal.trim().toLowerCase();

        const filtered = data.filter((row) => {
          const catMatch = catId === "all" || cfg.getCategory(row) === catId;
          const searchMatch =
            !q ||
            (cfg.getEvent(row) || "").toLowerCase().includes(q) ||
            (cfg.getDescription(row) || "").toLowerCase().includes(q);
          return catMatch && searchMatch;
        });

        document.getElementById("stat-total").textContent = data.length;
        document.getElementById("stat-shown").textContent = filtered.length;

        const tbody = document.getElementById("table-body");
        const table = document.getElementById("timeline-table");
        const msg = document.getElementById("state-msg");

        if (filtered.length === 0) {
          table.style.display = "none";
          msg.textContent = "該当するデータがありません。";
          msg.style.display = "";
          return;
        }

        msg.style.display = "none";
        table.style.display = "";

        tbody.innerHTML = filtered
          .map((row) => {
            const year = cfg.formatYear(row);
            const event = esc(cfg.getEvent(row));
            const desc = esc(cfg.getDescription(row) || "");
            const cat = cfg.getCategory(row);
            const catDef = (cfg.categories || []).find((c) => c.id === cat);
            const chipStyle = catDef
              ? `background:${catDef.bg};color:${catDef.fg};`
              : "background:#e8e8e5;color:#555;";
            const chipLabel = catDef ? catDef.label : esc(cat || "");
            const wikiUrl = cfg.showWikiLink ? row.wiki_url || "" : "";

            return `<tr>
            <td class="cell-year">${year}</td>
            <td class="cell-event">${event}</td>
            <td><span class="cat-chip" style="${chipStyle}">${chipLabel}</span></td>
            <td class="cell-desc col-desc">${desc}</td>
            ${
              cfg.showWikiLink
                ? `<td>${
                    wikiUrl
                      ? `<a class="wiki-link" href="${esc(wikiUrl)}" target="_blank" rel="noopener">
                       <i class="bi bi-box-arrow-up-right"></i>
                     </a>`
                      : ""
                  }</td>`
                : ""
            }
          </tr>`;
          })
          .join("");
      }

      function esc(s) {
        return String(s ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }
    </script>
  </body>
</html>

<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>世界史年表 管理画面</title>
    <link rel="icon" href="../../../images/worldhistoryquiz.png" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css" />

    <style>
      /* ── ナビゲーション画面固有スタイル ── */

      /* ページ全体を縦中央寄せ（ログイン画面と同じ背景） */
      .nav-screen {
        display: none;
        min-height: 100vh;
        background: linear-gradient(135deg, #1a2b3c 0%, #2c4a66 100%);
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .nav-screen.visible {
        display: flex;
      }

      /* ログインカードと同幅のコンテナ */
      .nav-card {
        background: var(--bg-light);
        border-radius: 16px;
        padding: 40px 36px;
        width: 100%;
        max-width: 440px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        text-align: center;
      }

      /* ロゴ：login-logo と同じ */
      .nav-card .login-logo {
        margin: 0 auto 20px;
      }

      .nav-title {
        font-size: 1.4rem;
        font-weight: 700;
        color: var(--text-light);
        margin-bottom: 6px;
      }

      .nav-subtitle {
        color: var(--text-light-secondary);
        font-size: 0.9rem;
        margin-bottom: 32px;
      }

      /* ページ選択ボタン群 */
      .nav-links {
        display: flex;
        flex-direction: column;
        gap: 14px;
        margin-bottom: 28px;
      }

      .nav-link-btn {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 18px 20px;
        border: 2px solid var(--border-light);
        border-radius: 10px;
        background: var(--bg-light-secondary);
        color: var(--text-light);
        text-decoration: none;
        font-family: inherit;
        font-size: 0.95rem;
        cursor: pointer;
        transition: all 0.2s;
        text-align: left;
      }

      .nav-link-btn:hover {
        border-color: var(--accent-gold);
        background: rgba(229, 170, 112, 0.08);
        transform: translateY(-2px);
        box-shadow: 0 6px 16px var(--shadow-light);
        color: var(--text-light);
      }

      .nav-link-icon {
        font-size: 1.8rem;
        line-height: 1;
        flex-shrink: 0;
      }

      .nav-link-text {
        flex: 1;
      }

      .nav-link-title {
        font-weight: 700;
        font-size: 1rem;
        margin-bottom: 3px;
      }

      .nav-link-desc {
        font-size: 0.78rem;
        color: var(--text-light-secondary);
        line-height: 1.4;
      }

      .nav-link-arrow {
        color: var(--text-light-secondary);
        font-size: 1rem;
        flex-shrink: 0;
      }

      /* ユーザー情報 + ログアウト行 */
      .nav-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding-top: 20px;
        border-top: 1px solid var(--border-light);
      }

      .nav-user {
        font-size: 0.8rem;
        color: var(--text-light-secondary);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        flex: 1;
      }

      /* btn-logout を流用 */
    </style>
  </head>
  <body>
    <!-- ログイン画面（style.css の .login-screen をそのまま流用） -->
    <div id="loginScreen" class="login-screen">
      <div class="login-card">
        <div class="login-logo">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="40"
            height="40"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
        </div>
        <h2 class="login-title">管理者ログイン</h2>
        <p class="login-subtitle">世界史年表 管理画面</p>
        <div id="loginError" class="login-error" style="display: none"></div>
        <div class="form-group">
          <label for="loginEmail">メールアドレス</label>
          <input
            type="email"
            id="loginEmail"
            placeholder="admin@example.com"
            autocomplete="email"
          />
        </div>
        <div class="form-group">
          <label for="loginPassword">パスワード</label>
          <input
            type="password"
            id="loginPassword"
            placeholder="••••••••"
            autocomplete="current-password"
          />
        </div>
        <button id="loginBtn" class="btn-login" type="button">ログイン</button>
      </div>
    </div>

    <!-- ナビゲーション画面（認証後に表示） -->
    <div id="navScreen" class="nav-screen">
      <div class="nav-card">
        <div class="login-logo">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="40"
            height="40"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
        </div>
        <h2 class="nav-title">世界史年表 管理画面</h2>
        <p class="nav-subtitle">wh_dates</p>

        <div class="nav-links">
          <a href="main.html" class="nav-link-btn">
            <span class="nav-link-icon">📋</span>
            <span class="nav-link-text">
              <div class="nav-link-title">Data Management</div>
              <div class="nav-link-desc">
                イベントの追加・編集・削除、検索・フィルタリング
              </div>
            </span>
            <span class="nav-link-arrow">›</span>
          </a>
          <a href="memo.html" class="nav-link-btn">
            <span class="nav-link-icon">📝</span>
            <span class="nav-link-text">
              <div class="nav-link-title">Memo Editor</div>
              <div class="nav-link-desc">
                各レコードへのMarkdownメモの追記・プレビュー
              </div>
            </span>
            <span class="nav-link-arrow">›</span>
          </a>
        </div>

        <div class="nav-footer">
          <span class="nav-user" id="navUser"></span>
          <button id="logoutBtn" class="btn-logout" type="button">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
              <polyline points="16 17 21 12 16 7"></polyline>
              <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
            Log Out
          </button>
        </div>
      </div>
    </div>

    <script type="module">
      import { db } from "../../../js/supabase_config.js";

      // ── テーマ ──────────────────────────────────────────────────
      (function () {
        const p = localStorage.getItem("pref-theme");
        if (
          p === "dark" ||
          (!p && matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
          document.body.classList.add("dark");
        }
      })();

      // ── Auth ────────────────────────────────────────────────────
      (async function () {
        const {
          data: { session },
        } = await db.auth.getSession();
        if (session) showNav(session.user);
        else showLogin();

        db.auth.onAuthStateChange((_e, s) => {
          if (s) showNav(s.user);
          else showLogin();
        });
      })();

      function showLogin() {
        document.getElementById("loginScreen").style.display = "flex";
        document.getElementById("navScreen").classList.remove("visible");
      }

      function showNav(user) {
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("navScreen").classList.add("visible");
        document.getElementById("navUser").textContent = user.email;
      }

      // ── Login ───────────────────────────────────────────────────
      document
        .getElementById("loginBtn")
        .addEventListener("click", handleLogin);
      document
        .getElementById("loginPassword")
        .addEventListener("keydown", (e) => {
          if (e.key === "Enter") handleLogin();
        });

      async function handleLogin() {
        const email = document.getElementById("loginEmail").value.trim();
        const pw = document.getElementById("loginPassword").value;
        const btn = document.getElementById("loginBtn");
        const err = document.getElementById("loginError");

        if (!email || !pw) {
          err.textContent = "メールアドレスとパスワードを入力してください";
          err.style.display = "block";
          return;
        }

        btn.textContent = "ログイン中...";
        btn.disabled = true;
        err.style.display = "none";

        const { error } = await db.auth.signInWithPassword({
          email,
          password: pw,
        });

        btn.textContent = "ログイン";
        btn.disabled = false;

        if (error) {
          err.textContent =
            "ログインに失敗しました。メールアドレスまたはパスワードが違います。";
          err.style.display = "block";
        }
      }

      // ── Logout ──────────────────────────────────────────────────
      document
        .getElementById("logoutBtn")
        .addEventListener("click", () => db.auth.signOut());
    </script>
  </body>
</html>

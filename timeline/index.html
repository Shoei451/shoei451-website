<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timeline | Shoei451</title>
    <link rel="icon" type="image/png" href="/images/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="../css/theme-toggle.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-left">
        <a class="back-link" id="back-link" href="#">
          <i class="bi bi-chevron-left"></i>
          <span id="back-label">ホーム</span>
        </a>
        <span class="header-title" id="header-title">年表</span>
      </div>
      <div class="header-right">
        <span class="logo-switches" id="theme-toggle-container"></span>
      </div>
    </header>

    <div class="controls">
      <input
        type="search"
        class="search-input"
        id="search-input"
        placeholder="Search by keyword..."
        autocomplete="off"
      />
    </div>

    <div class="stats-bar">
      <span class="stat-item">全 <strong id="stat-total">-</strong> 件</span>
      <span class="stat-item"
        >表示中 <strong id="stat-shown">-</strong> 件</span
      >
    </div>

    <div class="tabs-wrap" id="tabs-wrap"></div>

    <div class="table-wrap">
      <div class="state-msg" id="state-msg">Loading...</div>
      <table class="timeline-table" id="timeline-table" style="display: none">
        <thead>
          <tr id="table-head"></tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="../js/theme-toggle.js"></script>
    <script type="module" src="script.js"></script>
  </body>
</html>
